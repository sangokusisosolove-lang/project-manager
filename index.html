function saveTask(){
  const name=document.getElementById('t-name').value.trim();
  if(!name){document.getElementById('fld-tname').classList.add('err');document.getElementById('t-name').focus();return;}
  const members=document.getElementById('t-members').value.split(/[,、，\s]+/).map(s=>s.trim()).filter(Boolean);
  const data={name,detail:document.getElementById('t-detail').value.trim(),action:document.getElementById('t-action').value.trim(),actionDate:document.getElementById('t-adate').value,actionTime:document.getElementById('t-atime').value,actionEndTime:document.getElementById('t-aetime').value,date:document.getElementById('t-date').value,priority:document.getElementById('t-pri').value,members,memo:document.getElementById('t-memo').value.trim()};
  if(editTaskId){
    const i=tasks.findIndex(t=>t.id===editTaskId);tasks[i]={...tasks[i],...data};
  }else{
    const maxOrder=projTasks().filter(t=>!t.done).reduce((m,t)=>Math.max(m,t.order??0),0);
    tasks.push({id:tnid++,done:false,projectId:selectedProjId,order:maxOrder+1,...data});
  }
  closeTaskM();scheduleSave();renderTasks();
  if(currentTab==='actions')renderActions();
  if(currentTab==='cal')renderCalView();
}
function deleteTask(id){if(!confirm('タスクを削除しますか？'))return;tasks=tasks.filter(t=>t.id!==id);scheduleSave();renderTasks();}
async function toggleTaskDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const wasActive=!t.done;
  t.done=!t.done;
  scheduleSave();renderTasks();
  if(currentTab==='actions')renderActions();

  if(wasActive){
    // 未完了→完了：カレンダー登録済みなら自動削除
    showToast(`「${t.name}」を完了・アーカイブしました`);
    if(t.calEventId){
      try{
        const res=await jsonpFetch({action:'deleteCalEvent',eventId:t.calEventId});
        if(res.ok){
          const ti=tasks.findIndex(x=>x.id===id);
          tasks[ti].calEventId=null;
          scheduleSave();
          showToast('✓ カレンダーの予定も削除しました');
        }
      }catch(e){showToast('⚠️ カレンダー削除に失敗しました','error');}
    }
  }else{
    // 完了→再開：カレンダー未登録かつアクション日がある場合は確認
    showToast(`「${t.name}」を再開しました`);
    if(!t.calEventId&&t.actionDate){
      showCalRestoreConfirm(id);
    }
  }
}

function showCalRestoreConfirm(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const adtStr=fmtAdt(t.actionDate,t.actionTime,t.actionEndTime);
  document.getElementById('cal-confirm-title').innerHTML='<i class="ti ti-calendar-plus" style="margin-right:6px;color:var(--blue)"></i>カレンダーに登録しますか？';
  document.getElementById('cal-confirm-msg').textContent='タスクを再開しました。次回アクションをGoogleカレンダーに登録しますか？';
  document.getElementById('cal-confirm-detail').innerHTML=`
    <strong>${esc(t.action||t.name)}</strong>
    <span>${adtStr||t.actionDate}</span>
    <span style="margin-top:4px"><span class="cal-event-status none"><i class="ti ti-calendar-off" style="font-size:10px"></i>未登録</span></span>`;
  document.getElementById('cal-confirm-footer').innerHTML=`
    <button class="bcnl" onclick="closeCalConfirm()">登録しない</button>
    <button class="bsv" onclick="closeCalConfirm();registerCal(${id})"><i class="ti ti-calendar-plus" style="font-size:13px"></i>登録する</button>`;
  document.getElementById('cal-confirm-ov').classList.add('open');
}

// タスクの次回アクションをHTML内カレンダーに予定として登録
function registerCal(id){
  const t=tasks.find(x=>x.id===id);
  if(!t||!t.actionDate){ showToast('⚠️ 次回アクションの実施日が未設定です','error'); return; }
  // 既に登録済みなら確認モーダルを開く
  if(t.calEventId && calEvents.find(e=>String(e.id)===String(t.calEventId))){
    showCalEventInfo(id); return;
  }
  const proj=projects.find(p=>p.id===t.projectId);
  const memoLines=[
    `【プロジェクト】${proj?proj.name:''}`,
    `【タスク】${t.name}`,
    t.detail?`【詳細】${t.detail}`:'',
    `【期日】${t.date||'未設定'}`,
    (t.members||[]).length?`【担当者】${t.members.join('、')}`:''
  ].filter(Boolean).join('\n');
  const ev={
    id:ceNid++,
    title:t.action||t.name,
    memo:memoLines,
    date:t.actionDate,
    allDay:!t.actionTime,
    startTime:t.actionTime||'',
    endTime:t.actionEndTime||'',
    repeat:'none', repeatEnd:'',
    alert:'15',
    color:'green',
    srcTaskId:t.id,          // 元タスクとの紐付け
    createdAt:nowISO(), updatedAt:nowISO()
  };
  calEvents.push(ev);
  const ti=tasks.findIndex(x=>x.id===id);
  tasks[ti].calEventId=ev.id;
  scheduleSave();
  renderTasks();
  if(currentTab==='cal') renderCalView();
  scheduleAlerts();
  showToast('✓ カレンダーに予定を追加しました');
}

function showCalEventInfo(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const adtStr=fmtAdt(t.actionDate,t.actionTime,t.actionEndTime);
  document.getElementById('cal-confirm-title').innerHTML='<i class="ti ti-calendar-check" style="margin-right:6px;color:var(--green)"></i>カレンダーに登録済み';
  document.getElementById('cal-confirm-msg').textContent='このタスクの次回アクションはカレンダーに登録されています。';
  document.getElementById('cal-confirm-detail').innerHTML=`
    <strong>${esc(t.action||t.name)}</strong>
    <span>${adtStr||t.actionDate}</span>
    <span style="margin-top:4px"><span class="cal-event-status registered"><i class="ti ti-check" style="font-size:10px"></i>登録済み</span></span>`;
  document.getElementById('cal-confirm-footer').innerHTML=`
    <button class="bcnl" onclick="closeCalConfirm()">閉じる</button>
    <button class="bsv" onclick="closeCalConfirm();switchTab('cal');jumpToEvent(${t.calEventId})"><i class="ti ti-calendar" style="font-size:13px"></i>カレンダーで表示</button>
    <button class="bsv" style="background:var(--red)" onclick="deleteCalEvent(${id})"><i class="ti ti-trash" style="font-size:13px"></i>削除</button>`;
  document.getElementById('cal-confirm-ov').classList.add('open');
}

function deleteCalEvent(id){
  const t=tasks.find(x=>x.id===id);
  if(!t||!t.calEventId)return;
  closeCalConfirm();
  calEvents=calEvents.filter(e=>String(e.id)!==String(t.calEventId));
  const ti=tasks.findIndex(x=>x.id===id);
  tasks[ti].calEventId=null;
  scheduleSave();
  renderTasks();
  if(currentTab==='cal') renderCalView();
  scheduleAlerts();
  showToast('✓ カレンダーから予定を削除しました');
}

function closeCalConfirm(){document.getElementById('cal-confirm-ov').classList.remove('open');}

// カレンダーで該当予定の日付へジャンプ
function jumpToEvent(evId){
  const ev=calEvents.find(e=>String(e.id)===String(evId));
  if(ev){ calBaseDate=new Date(ev.date+'T00:00:00'); _calScrollDone=false; renderCalView(); }
}

function renderActions(){
  const el=document.getElementById('action-area');
  const td=today();

  // フィルターUI追加
  let filterRow=el.querySelector('.action-toolbar');
  if(!filterRow){
    el.innerHTML='<div class="action-toolbar"><div class="sw"><i class="ti ti-search"></i><input id="act-search" placeholder="アクションを検索..." oninput="renderActionsBody()"></div><select class="fsel" id="act-proj-filter" onchange="renderActionsBody()"><option value="">プロジェクト：すべて</option></select></div><div id="action-body"></div>';
    // プロジェクト一覧をselectに
    const psel=document.getElementById('act-proj-filter');
    projects.filter(p=>!p.done).forEach(p=>{
      const o=document.createElement('option');o.value=p.id;o.textContent=p.name;psel.appendChild(o);
    });
  }
  renderActionsBody();
}

function renderActionsBody(){
  const el=document.getElementById('action-body');
  if(!el)return;
  const td=today();
  const q=(document.getElementById('act-search')?.value||'').trim().toLowerCase();
  const projFilter=document.getElementById('act-proj-filter')?.value||'';

  const normTasks=tasks.map(t=>{
    const n={};Object.keys(t).forEach(k=>{n[k.toLowerCase()]=t[k];});
    return{...n,id:Number(t.id||n.id)||0,projectId:Number(t.projectId||t.projectid||n.projectid)||0,name:t.name||n.name||'',detail:t.detail||n.detail||'',action:t.action||n.action||'',actionDate:t.actionDate||t.actiondate||n.actiondate||'',actionTime:t.actionTime||t.actiontime||n.actiontime||'',actionEndTime:t.actionEndTime||t.actionendtime||n.actionendtime||'',date:t.date||n.date||'',priority:t.priority||n.priority||'mid',members:t.members||n.members||[],memo:t.memo||n.memo||'',done:t.done===true||t.done==='TRUE'||t.done==='true'};
  });

  let items=normTasks
    .filter(t=>{
      const ad=t.actionDate;
      if(!ad||String(ad).trim()===''||String(ad).trim()==='0')return false;
      if(t.done)return false; // 完了・アーカイブ済みは常に除外
      if(projFilter&&String(t.projectId)!==String(projFilter))return false;
      if(q){const h=[t.name,t.action,t.detail,...(t.members||[])].join(' ').toLowerCase();if(!h.includes(q))return false;}
      return true;
    })
    .map(t=>{
      const proj=projects.find(p=>String(p.id)===String(t.projectId));
      return{...t,projName:proj?proj.name:'（プロジェクト不明）',projDone:proj?proj.done:false};
    })
    .sort((a,b)=>{
      const da=String(a.actionDate)+(a.actionTime||'00:00');
      const db=String(b.actionDate)+(b.actionTime||'00:00');
      return da>db?1:da<db?-1:0;
    });

  if(!items.length){el.innerHTML=`<div class="action-empty"><i class="ti ti-calendar-off" style="font-size:36px;display:block;margin:0 auto 12px;color:var(--text3)"></i>次回アクションが設定されているタスクがありません</div>`;return;}

  const groups={};
  items.forEach(t=>{const key=String(t.actionDate);if(!groups[key])groups[key]=[];groups[key].push(t);});

  const htmlStr=Object.entries(groups).map(([date,list])=>{
    const parts=date.split('-');const m=parts[1]||'?',d=parts[2]||'?';
    const isToday=date===td,isOv=date<td;
    const dowIdx=new Date(date).getDay();
    const dow=['日','月','火','水','木','金','土'][isNaN(dowIdx)?0:dowIdx];
    const labelClass=isOv?'overdue':isToday?'today':'';
    const labelIcon=isOv?'<i class="ti ti-alert-triangle" style="font-size:13px"></i>':isToday?'<i class="ti ti-sun" style="font-size:13px"></i>':'<i class="ti ti-calendar" style="font-size:13px"></i>';
    const labelText=isOv?`${m}/${d}（${dow}）— 期限超過`:isToday?`${m}/${d}（${dow}）— 今日`:`${m}/${d}（${dow}）`;
    const cards=list.map(t=>{
      const timeStr=t.actionTime?`${t.actionTime}${t.actionEndTime?'〜'+t.actionEndTime:''}`:' ';
      const mems=(t.members||[]).filter(Boolean);
      const isDone=t.done===true||t.done==='TRUE'||t.done==='true';
      return`<div class="action-item${isOv&&!isDone?' overdue-item':isToday&&!isDone?' today-item':''}" style="${isDone?'opacity:.45':''}">
        <div>
          <div class="action-item-proj"><i class="ti ti-folder" style="font-size:10px"></i>${esc(t.projName)}${t.projDone?'<span style="font-size:10px;color:var(--green);margin-left:4px">（完了）</span>':''}${isDone?'<span style="font-size:10px;color:var(--text3);margin-left:4px">タスク完了済み</span>':''}</div>
          <div class="action-item-name">${esc(t.name)}</div>
          ${t.action?`<div class="action-item-action"><i class="ti ti-arrow-right" style="font-size:12px"></i>${esc(t.action)}</div>`:''}
          <div class="action-item-chips">
            ${timeStr.trim()?`<span class="chip action-dt"><i class="ti ti-clock" style="font-size:10px"></i>${esc(timeStr)}</span>`:''}
            ${t.priority?`<span class="pb p${String(t.priority).charAt(0)}">${pl[t.priority]||t.priority}</span>`:''}
            ${mems.map(mm=>`<span class="chip"><i class="ti ti-user" style="font-size:10px"></i>${esc(mm)}</span>`).join('')}
          </div>
        </div>
        <div class="action-item-right">
          <button class="ib memo-btn" onclick="openMemoFromTask(${t.id})" title="メモを作成"><i class="ti ti-notes"></i></button>
          <button class="ib cal-btn" onclick="registerCal(${t.id})" title="Googleカレンダーに登録"><i class="ti ti-calendar-plus"></i></button>
          <button class="ib" onclick="openTaskM(${t.id})" title="タスクを編集"><i class="ti ti-pencil"></i></button>
          <button class="ib" onclick="selectProj(${Number(t.projectId)});switchTab('tasks')" title="プロジェクトのタスク一覧へ"><i class="ti ti-arrow-right"></i></button>
        </div>
      </div>`;
    }).join('');
    return`<div class="action-group"><div class="action-group-label ${labelClass}">${labelIcon}${labelText}<span style="margin-left:auto;font-size:11px;font-weight:400">${list.length}件</span></div>${cards}</div>`;
  }).join('');
  el.innerHTML=htmlStr;
}

function updateMemoProjFilter(){

  const cur=sel.value;

function openMemoM(id){
  editMemoId=id;
  currentMemoTags=[];
  document.getElementById('memo-mttl').textContent=id?'メモを編集':'メモを追加';
  document.getElementById('fld-memo-title').classList.remove('err');
  // プロジェクト・タスクselectを更新
  const psel=document.getElementById('m-proj');
  psel.innerHTML='<option value="">（なし）</option>';
  projects.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=p.name;psel.appendChild(o);});
  if(id){
    const m=memos.find(x=>x.id===id);
    document.getElementById('m-title').value=m.title;
    document.getElementById('m-body').value=m.body||'';
    document.getElementById('m-proj').value=m.projectId||'';
    document.getElementById('m-sortkey').value=m.sortkey||'';
    currentMemoTags=[...(m.tags||[])];
    updateTaskSelect(m.projectId,m.taskId);

    ['m-title','m-body'].forEach(i=>document.getElementById(i).value='');

    document.getElementById('m-sortkey').value='';

  document.getElementById('memo-ov').classList.add('open');

function closeMemoM(){document.getElementById('memo-ov').classList.remove('open');editMemoId=null;currentMemoTags=[];}



function updateTaskSelect(projId,selTaskId){
  const tsel=document.getElementById('m-task');
  tsel.innerHTML='<option value="">（なし）</option>';
  if(projId){
    tasks.filter(t=>String(t.projectId)===String(projId)).forEach(t=>{
      const o=document.createElement('option');o.value=t.id;o.textContent=(t.done?'[完] ':'')+t.name;tsel.appendChild(o);
    });
    tsel.value=selTaskId||'';
  }
}

function addMemoTag(){
  const inp=document.getElementById('m-tag-input');
  const v=inp.value.trim();
  if(!v)return;
  if(!currentMemoTags.includes(v))currentMemoTags.push(v);
  inp.value='';
  renderMemoTagPreview();
}
function removeMemoTag(tag){
  currentMemoTags=currentMemoTags.filter(t=>t!==tag);
  renderMemoTagPreview();
}
function renderMemoTagPreview(){
  document.getElementById('m-tag-preview').innerHTML=currentMemoTags.map(t=>`<span class="tag-preview-item">${esc(t)}<button class="tag-remove" onclick="removeMemoTag('${esc(t)}')" title="削除">×</button></span>`).join('');
}

function saveMemo(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('fld-memo-title').classList.add('err');document.getElementById('m-title').focus();return;}
  const data={
    title,
    body:document.getElementById('m-body').value.trim(),
    projectId:document.getElementById('m-proj').value||null,
    taskId:document.getElementById('m-task').value||null,
    sortkey:document.getElementById('m-sortkey').value||'',
    tags:[...currentMemoTags],
    updatedAt:nowISO(),
  };
  if(editMemoId){
    const i=memos.findIndex(m=>m.id===editMemoId);
    memos[i]={...memos[i],...data};
  }else{
    memos.push({id:mnid++,createdAt:nowISO(),...data});
  }
  closeMemoM();scheduleSave();renderMemos();
  showToast('✓ メモを保存しました');
}

function deleteMemo(id){
  if(!confirm('メモを削除しますか？'))return;
  memos=memos.filter(m=>m.id!==id);
  scheduleSave();renderMemos();
}

function openMemoFromTask(taskId){
  const t=tasks.find(x=>x.id===taskId);if(!t)return;
  // タスクのプロジェクトを設定した状態でメモモーダルを開く
  openMemoM(null);

  const body=[(t.detail?`【詳細】${t.detail}`:''),

function filterMemosByTag(tag){

  renderMemos();
  renderMemoTagFilterBar();
}

function renderMemoTagFilterBar(){
  // 全タグを収集
  const allTags=[...new Set(memos.flatMap(m=>m.tags||[]))].sort();
  const bar=document.getElementById('memo-tag-filters');
  if(!allTags.length){bar.innerHTML='';return;}
  bar.innerHTML=allTags.map(t=>`<span class="memo-tag${activeTagFilter===t?' active-tag':''}" onclick="filterMemosByTag('${esc(t)}')"><i class="ti ti-tag" style="font-size:10px"></i>${esc(t)}</span>`).join('');

function renderMemos(listOnly){
  const q=(document.getElementById('memo-search')?.value||'').trim().toLowerCase();
  const projFilter=document.getElementById('memo-proj-filter')?.value||'';
  const skFilter=document.getElementById('memo-sortkey-filter')?.value||'';
  const sortMode=document.getElementById('memo-sort')?.value||'date-desc';
  renderMemoTagFilterBar();

  let list=[...memos].filter(m=>{
    if(projFilter&&String(m.projectId)!==String(projFilter))return false;
    if(skFilter&&m.sortkey!==skFilter)return false;
    if(activeTagFilter&&!(m.tags||[]).includes(activeTagFilter))return false;
    if(q){const h=[m.title,m.body,...(m.tags||[])].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });

  if(sortMode==='date-desc')list.sort((a,b)=>(b.updatedAt||b.createdAt||'')>(a.updatedAt||a.createdAt||'')?1:-1);
  else if(sortMode==='date-asc')list.sort((a,b)=>(a.updatedAt||a.createdAt||'')>(b.updatedAt||b.createdAt||'')?1:-1);
  else if(sortMode==='proj')list.sort((a,b)=>String(a.projectId||'zz')>String(b.projectId||'zz')?1:-1);
  else if(sortMode==='sortkey')list.sort((a,b)=>(a.sortkey||'zz')>(b.sortkey||'zz')?1:-1);

  document.getElementById('memo-cnt').textContent=`${list.length}件`;
  const el=document.getElementById('memo-list');
  if(!list.length){
    el.innerHTML=`<div class="memo-empty" style="padding:2rem 1rem"><i class="ti ti-notes-off" style="font-size:32px;display:block;margin:0 auto 12px;color:var(--text3)"></i>メモがありません<br><span style="font-size:12px;margin-top:6px;display:block">「メモを追加」または<br>タスクカードの <i class="ti ti-notes" style="font-size:12px;color:var(--yellow)"></i> から作成</span></div>`;
    document.getElementById('memo-detail').innerHTML=memoDetailEmpty();
    selectedMemoId=null;
    return;
  }

  // 選択中のメモがリストに残っているか確認、なければ先頭を選択
  if(!selectedMemoId||!list.find(m=>String(m.id)===String(selectedMemoId))){
    selectedMemoId=list[0].id;
  }

  // 一覧ペイン描画
  el.innerHTML=list.map(m=>{
    const proj=projects.find(p=>String(p.id)===String(m.projectId));
    const preview=m.body?m.body.replace(/\n/g,' '):'';
    const active=String(m.id)===String(selectedMemoId)?' active':'';
    return`<div class="memo-list-item${active}" onclick="selectMemo(${m.id})">
      <div class="memo-list-item-title">${esc(m.title)}</div>
      ${preview?`<div class="memo-list-item-preview">${esc(preview)}</div>`:''}
      <div class="memo-list-item-meta">
        ${m.sortkey?`<span class="cbadge ${sortkeyCls[m.sortkey]||'ce'}" style="font-size:10px">${esc(m.sortkey)}</span>`:''}
        ${proj?`<span class="memo-proj-ref"><i class="ti ti-folder"></i>${esc(proj.name)}</span>`:''}

// インライン編集の確定（blur時）
function commitMemoInline(id, field, value){
  const m=memos.find(x=>String(x.id)===String(id));
  if(!m)return;
  const newVal=value.replace(/\u00a0/g,' ').trimEnd(); // nbsp除去
  if((m[field]||'')===newVal)return; // 変更なしなら何もしない
  m[field]=newVal;
  m.updatedAt=nowISO();
  scheduleSave();
  // 一覧の該当アイテムと更新日時だけ更新（フォーカスは奪わない）
  renderMemoListOnly();
  const upd=document.getElementById('memo-detail-updated');
  if(upd)upd.textContent=fmtDatetime(m.updatedAt);
  showToast('✓ メモを更新しました');
}

// 本文プレビュー → 編集モードへ
function enterMemoEdit(id){
  const m=memos.find(x=>String(x.id)===String(id));
  if(!m)return;
  const wrap=document.getElementById('memo-body-wrap');
  if(!wrap)return;
  wrap.innerHTML=`<textarea class="memo-detail-body memo-edit-area" id="memo-edit-body" spellcheck="false"

function commitMemoBody(id){

// 簡易Markdownレンダリング（見出し・箇条書き・チェックボックス・太字・コード）
function renderMarkdown(src){
  const lines=String(src).split('\n');
  let html='', inUl=false, inOl=false;
  const closeLists=()=>{ if(inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} };
  const inline=(s)=>{
    s=esc(s);
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--blue)">$1</a>');
    s=s.replace(/(^|\s)(https?:\/\/[^\s]+)/g,'$1<a href="$2" target="_blank" rel="noopener" style="color:var(--blue)">$2</a>');
    return s;
  };
  lines.forEach(line=>{
    let m;
    if(m=line.match(/^(#{1,3})\s+(.*)$/)){
      closeLists(); const lv=m[1].length;
      html+=`<h${lv+2} class="md-h">${inline(m[2])}</h${lv+2}>`;
    }else if(m=line.match(/^\s*[-*]\s+\[([ xX])\]\s+(.*)$/)){
      // チェックボックス
      if(!inUl){closeLists();html+='<ul class="md-ul md-checklist">';inUl=true;}
      const checked=m[1].toLowerCase()==='x';
      html+=`<li class="md-check"><span class="md-checkbox${checked?' checked':''}"><i class="ti ti-${checked?'square-check':'square'}" style="font-size:14px"></i></span><span style="${checked?'opacity:.6;text-decoration:line-through':''}">${inline(m[2])}</span></li>`;
    }else if(m=line.match(/^\s*[-*]\s+(.*)$/)){
      if(!inUl){closeLists();html+='<ul class="md-ul">';inUl=true;}
      html+=`<li>${inline(m[1])}</li>`;
    }else if(m=line.match(/^\s*\d+\.\s+(.*)$/)){
      if(!inOl){closeLists();html+='<ol class="md-ol">';inOl=true;}
      html+=`<li>${inline(m[1])}</li>`;
    }else if(line.trim()===''){
      closeLists(); html+='<div style="height:8px"></div>';
    }else{
      closeLists(); html+=`<div>${inline(line)}</div>`;
    }
  });
  closeLists();
  return html;
}

/* ── モーダル外クリック・Escape ── */
['proj-ov','task-ov','memo-ov','cal-confirm-ov','ev-ov','gsearch-ov','backup-ov'].forEach(id=>{
  const elm=document.getElementById(id);
  if(elm) elm.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    ['proj-ov','task-ov','memo-ov','cal-confirm-ov','ev-ov','gsearch-ov','backup-ov'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('open');});
    closeEvPopover&&closeEvPopover();
    return;
  }
  // 入力欄やモーダル表示中はショートカット無効
  const tag=(e.target.tagName||'').toLowerCase();
  const typing=tag==='input'||tag==='textarea'||tag==='select'||e.target.isContentEditable;
  const modalOpen=['proj-ov','task-ov','memo-ov','cal-confirm-ov','ev-ov','gsearch-ov'].some(id=>document.getElementById(id).classList.contains('open'));
  // / でグローバル検索（入力中でなければ）
  if(e.key==='/'&&!typing&&!modalOpen){ e.preventDefault(); openGlobalSearch(); return; }
  // Ctrl/Cmd+S → 手動保存（入力中でも有効）
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){
    e.preventDefault();
    manualSave();
    return;
  }
  if(typing||modalOpen) return;
  // タブ切替 1〜4
  if(e.key==='1'){ switchTab('tasks'); return; }
  if(e.key==='2'){ switchTab('actions'); return; }
  if(e.key==='3'){ switchTab('memo'); return; }
  if(e.key==='4'){ switchTab('cal'); return; }
  // N → 新規（タスクタブ：タスク追加、カレンダー：予定追加、メモ：メモ追加）
  if(e.key.toLowerCase()==='n'){
    e.preventDefault();
    if(currentTab==='cal') openEvM(null,null,null);
    else if(currentTab==='memo') openMemoM(null);
    else if(selectedProjId) openTaskM(null);
    else openProjM(null);
    return;
  }
  // R → 再読み込み
  if(e.key.toLowerCase()==='r'){ e.preventDefault(); reloadData(); return; }
  // カレンダータブ：矢印で週移動、T で今日
  if(currentTab==='cal'){
    if(e.key==='ArrowLeft'){ e.preventDefault(); calMove(-1); return; }
    if(e.key==='ArrowRight'){ e.preventDefault(); calMove(1); return; }
    if(e.key.toLowerCase()==='t'){ e.preventDefault(); calGoToday(); return; }
  }
});

/* ── 日付ユーティリティ ── */
function calDateStr(d){ return localDateStr(d); }
function calGetMonday(d){
  const dt=new Date(d); dt.setHours(0,0,0,0);
  const day=dt.getDay(); const diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff); return dt;
}
function calDaysForView(){
  const monday = calGetMonday(calBaseDate);
  if(calViewMode==='week')     return [0,1,2,3,4,5,6].map(i=>new Date(monday.getTime()+i*86400000));
  if(calViewMode==='threeday') return [0,1,2].map(i=>new Date(calBaseDate.getTime()+i*86400000));
  if(calViewMode==='day')      return [new Date(calBaseDate)];
  return []; // month handled separately
}
function calMove(n){
  // 週移動時は現在のスクロール位置を維持
  const sc=document.getElementById('cal-grid-scroll');
  if(sc) _calSavedScrollTop=sc.scrollTop;
  if(calViewMode==='week')      calBaseDate=new Date(calGetMonday(calBaseDate).getTime()+n*7*86400000);
  else if(calViewMode==='threeday') calBaseDate=new Date(calBaseDate.getTime()+n*3*86400000);
  else if(calViewMode==='day')  calBaseDate=new Date(calBaseDate.getTime()+n*86400000);
  else if(calViewMode==='month'){
    const d=new Date(calBaseDate); d.setDate(1); d.setMonth(d.getMonth()+n); calBaseDate=d;
  }
  renderCalView();
}
function calGoToday(){ calBaseDate=new Date(); _calScrollDone=false; _calSavedScrollTop=null; renderCalView(); }
function setCalView(mode){
  calViewMode=mode;
  _calScrollDone=false; _calSavedScrollTop=null;
  ['day','threeday','week','month'].forEach(m=>{
    const btn=document.getElementById('vsw-'+m);
    if(btn) btn.classList.toggle('active',m===mode);
  });
  renderCalView();
}
function initCalView(){ miniBaseMonth=null; _calScrollDone=false; _calSavedScrollTop=null; renderCalView(); }

/* ── 繰り返し展開（指定日付リスト → 表示すべき日付） ── */
function expandRepeat(ev, datesToCheck){
  const base=new Date(ev.date+'T00:00:00');
  return datesToCheck.filter(ds=>{
    const target=new Date(ds+'T00:00:00');
    if(target<base) return false;
    if(ev.repeatEnd&&ds>ev.repeatEnd) return false;
    const r=ev.repeat||'none';
    if(r==='none')     return ev.date===ds;
    if(r==='daily')    return true;
    if(r==='weekly')   return Math.round((target-base)/86400000)%7===0;
    if(r==='biweekly') return Math.round((target-base)/86400000)%14===0;
    if(r==='monthly')  return target.getDate()===base.getDate();
    if(r==='yearly')   return target.getMonth()===base.getMonth()&&target.getDate()===base.getDate();
    if(r==='monthlyNth'){
      // 基準日の「第N週の同じ曜日」に一致するか
      if(target.getDay()!==base.getDay()) return false;
      const baseNth=Math.ceil(base.getDate()/7);
      const targetNth=Math.ceil(target.getDate()/7);
      return baseNth===targetNth;
    }
    return false;
  });
}

// 「第N◯曜日」のラベルを生成
function nthWeekdayLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const nth=Math.ceil(d.getDate()/7);
  const dow=['日','月','火','水','木','金','土'][d.getDay()];
  return `第${nth}${dow}曜日`;
}

   メインレンダー分岐
═══════════════════════════════════════ */
function renderCalView(){
  updateCalPeriodLabel();
  renderMiniCal();
  if(calViewMode==='month') renderMonthView();
  else renderWeekDayView();
}

/* ── 期間ラベル ── */
function updateCalPeriodLabel(){
  const el=document.getElementById('cal-period-label');
  if(!el) return;
  if(calViewMode==='month'){
    const d=new Date(calBaseDate); d.setDate(1);
    el.textContent=`${d.getFullYear()}年 ${d.getMonth()+1}月`;
  } else if(calViewMode==='day'){
    const d=calBaseDate;
    const dow=['日','月','火','水','木','金','土'][d.getDay()];
    el.textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${dow}）`;
  } else {
    const days=calDaysForView();
    const m1=days[0].getMonth()+1,d1=days[0].getDate();
    const m2=days[days.length-1].getMonth()+1,d2=days[days.length-1].getDate();
    el.textContent=m1===m2?`${days[0].getFullYear()}年 ${m1}月 ${d1}日 〜 ${d2}日`
                          :`${days[0].getFullYear()}年 ${m1}月${d1}日 〜 ${m2}月${d2}日`;
  }
}

/* ═══════════════════════════════════════
   ミニカレンダー
═══════════════════════════════════════ */
function renderMiniCal(){
  const el=document.getElementById('cal-mini');
  if(!el) return;
  const viewDays=calViewMode==='month'?[]:calDaysForView();
  const viewDateStrs=new Set(viewDays.map(d=>calDateStr(d)));
  if(!miniBaseMonth){
    miniBaseMonth=new Date(calBaseDate); miniBaseMonth.setDate(1);
  }
  const y=miniBaseMonth.getFullYear(), m=miniBaseMonth.getMonth();
  const todayStr=today();
  const firstDay=new Date(y,m,1).getDay(); // 0=日
  const daysInMonth=new Date(y,m+1,0).getDate();
  const DOW_MINI=['日','月','火','水','木','金','土'];
  let html=`<div class="cal-mini-head">
    <button class="cal-mini-arrow" onclick="miniMove(-1)"><i class="ti ti-chevron-left"></i></button>
    <span class="cal-mini-month">${y}年${m+1}月</span>
    <button class="cal-mini-arrow" onclick="miniMove(1)"><i class="ti ti-chevron-right"></i></button>
  </div><div class="cal-mini-grid">`;
  DOW_MINI.forEach(d=>{ html+=`<div class="cal-mini-dow">${d}</div>`; });
  // 前月の空白
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-mini-day other-month"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=(ds===todayStr?'is-today':'')+(viewDateStrs.has(ds)?' in-view':'');
    html+=`<div class="cal-mini-day${cls?' '+cls:''}" onclick="calJumpTo('${ds}')">${d}</div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}
function miniMove(n){
  if(!miniBaseMonth) miniBaseMonth=new Date(calBaseDate);
  miniBaseMonth.setMonth(miniBaseMonth.getMonth()+n);
  renderMiniCal();
}
function calJumpTo(dateStr, toDay){
  calBaseDate=new Date(dateStr+'T00:00:00');
  if(toDay){
    // 指定日付の「日」ビューへ遷移
    calViewMode='day';
    ['day','threeday','week','month'].forEach(m=>{
      const btn=document.getElementById('vsw-'+m);
      if(btn) btn.classList.toggle('active',m==='day');
    });
  }
  renderCalView();
}

/* ═══════════════════════════════════════
   週 / 日 / 3日 ビュー
═══════════════════════════════════════ */
function renderWeekDayView(){
  const inner=document.getElementById('cal-grid-inner');
  if(!inner) return;
  const days=calDaysForView();
  const todayStr=today();
  const nCols=days.length;
  const DOW=['日','月','火','水','木','金','土'];

  // イベントマッピング
  const datesToCheck=days.map(d=>calDateStr(d));
  const evMap={}, evAllDay={};
  datesToCheck.forEach(ds=>{ evMap[ds]=[]; evAllDay[ds]=[]; });

  calEvents.forEach(ev=>{
    const occ=expandRepeat(ev,datesToCheck);
    occ.forEach(ds=>{
      if(ev.allDay) evAllDay[ds].push({...ev,occDate:ds});
      else          evMap[ds].push({...ev,occDate:ds});
    });
  });

  // ※次回アクションの自動表示は廃止。タスクは「カレンダーに反映」ボタンで予定として登録される

  // グリッドCSS
  const colTemplate = `52px repeat(${nCols},1fr)`;

  // ── ヘッダー ──
  let html=`<div style="display:grid;grid-template-columns:${colTemplate};position:sticky;top:0;z-index:11;background:var(--bg2);border-bottom:1px solid var(--border)">`;
  html+=`<div class="cal-head-gutter"></div>`;
  days.forEach(d=>{
    const ds=calDateStr(d);
    const dow=d.getDay();
    const isToday=ds===todayStr;
    const dowCls=dow===0?'sun':dow===6?'sat':'';
    html+=`<div class="cal-col-head${isToday?' is-today':''}${dowCls?' '+dowCls:''}" onclick="calJumpTo('${ds}',true)" title="クリックで${d.getMonth()+1}/${d.getDate()}の1日表示">
      <div class="cal-dow">${DOW[dow]}</div>
      <div class="cal-day-num">${d.getMonth()+1}/${d.getDate()}</div>
    </div>`;
  });
  html+='</div>';

  // ── 終日行 ──
  const hasAllDay=datesToCheck.some(ds=>evAllDay[ds].length>0);
  html+=`<div style="display:grid;grid-template-columns:${colTemplate};border-bottom:2px solid var(--border);background:var(--bg2)">`;
  html+=`<div class="cal-allday-gutter">終日</div>`;
  days.forEach(d=>{
    const ds=calDateStr(d);
    html+=`<div class="cal-allday-cell" data-date="${ds}" ondragover="onEvDragOver(event)" ondragleave="onEvDragLeave(event)" ondrop="onEvDropAllday(event,'${ds}')">`;
    evAllDay[ds].forEach(ev=>{
      if(ev._isTask){
        const col=TASK_COLORS[ev.priority]||TASK_COLORS.mid;
        const projTag=ev.projName?`<span style="opacity:.7;font-weight:400">[${esc(ev.projName)}] </span>`:'';
        html+=`<div class="cal-allday-ev" draggable="true" data-drag="task:${ev.taskId}:0" ondragstart="onEvDragStart(event)" ondragend="onEvDragEnd(event)" ontouchstart="onEvTouchStart(event)" style="background:${col.bg};border-left:3px solid ${col.border};color:${col.text}" onclick="openTaskM(${ev.taskId})" title="${ev.projName?'['+esc(ev.projName)+'] ':''}${esc(ev.title)}（ドラッグで移動）">${projTag}${esc(ev.title)}</div>`;
      } else {
        const col=EV_COLORS[ev.color]||EV_COLORS.blue;
        html+=`<div class="cal-allday-ev" draggable="true" data-drag="event:${ev.id}:0" ondragstart="onEvDragStart(event)" ondragend="onEvDragEnd(event)" ontouchstart="onEvTouchStart(event)" style="background:${col.bg};border-left:3px solid ${col.border};color:${col.text}" onclick="showEvPopover(event,'${ev.id}')" title="${esc(ev.title)}（ドラッグで移動）">${esc(ev.title)}</div>`;
      }
    });
    html+=`</div>`;
  });
  html+='</div>';

  // ── 時間グリッド ──
  html+=`<div style="display:grid;grid-template-columns:${colTemplate};position:relative">`;
  // 時間列
  html+=`<div class="cal-time-col">`;
  for(let h=CAL_S_H;h<CAL_E_H;h++){
    html+=`<div class="cal-time-cell" style="height:${HOUR_PX/2}px">${String(h).padStart(2,'0')}:00</div><div class="cal-time-cell half" style="height:${HOUR_PX/2}px"></div>`;
  }
  html+=`</div>`;
  // 日付列
  days.forEach(d=>{
    const ds=calDateStr(d);
    const isToday=ds===todayStr;
    const dow=d.getDay();
    const isWeekend=dow===0||dow===6;
    html+=`<div class="cal-day-col${isToday?' is-today':isWeekend?' is-weekend':''}" data-date="${ds}" onclick="handleCalClick(event,'${ds}')" ondragover="onEvDragOver(event)" ondragleave="onEvDragLeave(event)" ondrop="onEvDrop(event,'${ds}')" style="min-height:${(CAL_E_H-CAL_S_H)*HOUR_PX}px">`;
    for(let h=CAL_S_H;h<CAL_E_H;h++){
      html+=`<div class="cal-hour-block" style="height:${HOUR_PX/2}px"></div><div class="cal-hour-block half" style="height:${HOUR_PX/2}px"></div>`;
    }
    // タスクイベント
    const taskEvs=evMap[ds].filter(e=>e._isTask);
    const customEvs=evMap[ds].filter(e=>!e._isTask);
    // 重なり処理（簡易）
    [...taskEvs,...customEvs].forEach((ev,idx)=>{
      const col=ev._isTask?(TASK_COLORS[ev.priority]||TASK_COLORS.mid):(EV_COLORS[ev.color]||EV_COLORS.blue);
      const {top,height}=calEvPos(ev.startTime,ev.endTime);
      const icons=[];
      if(!ev._isTask&&ev.repeat&&ev.repeat!=='none') icons.push('<i class="ti ti-refresh"></i>');
      if(!ev._isTask&&ev.alert!==''&&ev.alert!=null) icons.push('<i class="ti ti-bell"></i>');
      const clickFn=ev._isTask?`openTaskM(${ev.taskId})`:`showEvPopover(event,'${ev.id}')`;
      // D&D用：イベント種別とID、継続時間（分）を保持
      const durMin=calEvDuration(ev.startTime,ev.endTime);
      const dragData=`${ev._isTask?'task':'event'}:${ev._isTask?ev.taskId:ev.id}:${durMin}`;
      html+=`<div class="cal-ev" draggable="true" data-drag="${dragData}" ondragstart="onEvDragStart(event)" ondragend="onEvDragEnd(event)" ontouchstart="onEvTouchStart(event)" style="top:${top}px;height:${Math.max(height,22)}px;background:${col.bg};border-left:3px solid ${col.border};color:${col.text}" onclick="event.stopPropagation();${clickFn}" title="${ev._isTask&&ev.projName?'['+esc(ev.projName)+'] ':''}${esc(ev.title)}（ドラッグで移動）">
        <div class="cal-ev-title">${ev._isTask?'<i class="ti ti-checkbox" style="font-size:9px;margin-right:2px"></i>':''}${esc(ev.title)}</div>
        ${ev._isTask&&ev.projName?`<div class="cal-ev-proj"><i class="ti ti-folder" style="font-size:8px"></i> ${esc(ev.projName)}</div>`:''}
        ${ev.startTime?`<div class="cal-ev-time">${ev.startTime}${ev.endTime?'〜'+ev.endTime:''}</div>`:''}
        ${icons.length?`<div class="cal-ev-icons">${icons.join('')}</div>`:''}
      </div>`;
    });
    // 現在時刻ライン
    if(isToday){
      const now=new Date();
      const nowH=now.getHours()+now.getMinutes()/60;
      if(nowH>=CAL_S_H&&nowH<CAL_E_H){
        const top=(nowH-CAL_S_H)*HOUR_PX;
        html+=`<div class="cal-now-line" id="cal-now-line" style="top:${top}px"><div class="cal-now-dot"></div></div>`;
      }
    }
    html+=`</div>`;
  });
  html+='</div>';

  inner.innerHTML=html;
  inner.style.minWidth=nCols<=1?'100%':'600px';

  // 今日付近にスクロール（初回のみ。移動・編集による再描画ではスクロール位置を維持）
  const scroll=document.getElementById('cal-grid-scroll');
  if(scroll){
    if(_calScrollDone){
      // 既にスクロール済み → 現在のスクロール位置を維持
      const keep=_calSavedScrollTop;
      if(keep!=null) requestAnimationFrame(()=>{ scroll.scrollTop=keep; });
    }else{
      const now=new Date();
      const nowH=now.getHours()+now.getMinutes()/60;
      const targetH=nowH>=CAL_S_H&&nowH<CAL_E_H?nowH:9;
      requestAnimationFrame(()=>{
        scroll.scrollTop=Math.max(0,(targetH-CAL_S_H)*HOUR_PX-80);
        _calScrollDone=true;
      });
    }
  }

  clearInterval(_calNowTimer);
  _calNowTimer=setInterval(()=>{
    const line=document.getElementById('cal-now-line');
    if(!line) return;
    const now=new Date(); const nowH=now.getHours()+now.getMinutes()/60;
    if(nowH>=CAL_S_H&&nowH<CAL_E_H) line.style.top=(nowH-CAL_S_H)*HOUR_PX+'px';
  },60000);
}

function calEvPos(startTime, endTime){
  const toFrac=t=>{ if(!t)return null; const[h,m]=t.split(':').map(Number);return h+m/60; };
  const s=toFrac(startTime); const e=toFrac(endTime);
  if(s===null) return{top:0,height:HOUR_PX};
  const cs=Math.max(s,CAL_S_H);
  const top=(cs-CAL_S_H)*HOUR_PX;
  let height=HOUR_PX;
  if(e!==null&&e>s){ const ce=Math.min(e,CAL_E_H); height=(ce-cs)*HOUR_PX; }
  return{top,height:Math.max(height,22)};
}

/* ═══════════════════════════════════════
   ドラッグ＆ドロップで予定の日時変更
═══════════════════════════════════════ */
let _calDrag=null; // {kind:'task'|'event', id, durMin}
let _calScrollDone=false; // 初回スクロール済みか
let _calSavedScrollTop=null; // 維持するスクロール位置
let _calAutoScrollTimer=null; // ドラッグ中オートスクロール

// 継続時間（分）を算出
function calEvDuration(startTime, endTime){
  if(!startTime||!endTime) return 0;
  const[sh,sm]=startTime.split(':').map(Number);
  const[eh,em]=endTime.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm);
  return d>0?d:0;
}
function minToTime(total){
  total=Math.max(0,Math.min(24*60-1,total));
  return `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

function onEvDragStart(e){
  const data=e.currentTarget.dataset.drag||'';
  const [kind,id,durMin]=data.split(':');
  // つかんだ位置がブロック上端から何分下かを記録（グラブオフセット補正用）
  const evRect=e.currentTarget.getBoundingClientRect();
  const grabPx=e.clientY-evRect.top;
  const grabMin=Math.round((grabPx/HOUR_PX)*60);
  _calDrag={kind,id,durMin:parseInt(durMin)||0,grabMin:isNaN(grabMin)?0:grabMin};
  e.currentTarget.classList.add('cal-ev-dragging');
  e.dataTransfer.effectAllowed='move';
  try{ e.dataTransfer.setData('text/plain',data); }catch(_){}
  // ドラッグ中の時刻表示ラベルを生成
  showDragTimeLabel(e.clientX,e.clientY,'');
}
function onEvDragEnd(e){
  e.currentTarget.classList.remove('cal-ev-dragging');
  document.querySelectorAll('.cal-day-col.cal-drop-target,.cal-allday-cell.cal-drop-target').forEach(el=>el.classList.remove('cal-drop-target'));
  hideDragTimeLabel();
  stopAutoScroll();
  _calDrag=null;
}

// ドラッグ中、グリッド上下端付近でオートスクロール
function handleAutoScroll(clientY){
  const scroll=document.getElementById('cal-grid-scroll');
  if(!scroll) return;
  const rect=scroll.getBoundingClientRect();
  const EDGE=70;       // 端の判定領域(px)
  const SPEED=12;      // 1フレームのスクロール量(px)
  let dir=0;
  if(clientY < rect.top+EDGE) dir=-1;        // 上端 → 上スクロール
  else if(clientY > rect.bottom-EDGE) dir=1; // 下端 → 下スクロール
  if(dir===0){ stopAutoScroll(); return; }
  if(_calAutoScrollTimer) return; // 既に動作中
  _calAutoScrollTimer=setInterval(()=>{
    scroll.scrollTop += dir*SPEED;
  },16);
}
function stopAutoScroll(){
  if(_calAutoScrollTimer){ clearInterval(_calAutoScrollTimer); _calAutoScrollTimer=null; }
}

/* ═══════════════════════════════════════
   タッチ操作によるドラッグ移動（モバイル対応）
   - 長押し(250ms)で掴む → 移動 → 離す
═══════════════════════════════════════ */
let _touchDrag=null; // {el, kind, id, durMin, grabMin, ghost, started}
let _touchHoldTimer=null;

function onEvTouchStart(e){
  if(e.touches.length!==1) return;
  const el=e.currentTarget;
  const data=el.dataset.drag||'';
  const [kind,id,durMin]=data.split(':');
  const touch=e.touches[0];
  // 掴んだ位置（ブロック内オフセット）
  const evRect=el.getBoundingClientRect();
  const grabPx=touch.clientY-evRect.top;
  const grabMin=Math.round((grabPx/HOUR_PX)*60);
  const startX=touch.clientX, startY=touch.clientY;
  // 長押し判定
  _touchHoldTimer=setTimeout(()=>{
    _touchDrag={
      el, kind, id, durMin:parseInt(durMin)||0,
      grabMin:isNaN(grabMin)?0:grabMin, started:true, ghost:null,
      title:el.querySelector('.cal-ev-title')?.textContent||el.textContent
    };
    _calDrag={kind,id,durMin:parseInt(durMin)||0,grabMin:isNaN(grabMin)?0:grabMin};
    el.classList.add('touch-dragging');
    // 触覚フィードバック
    if(navigator.vibrate) navigator.vibrate(30);
    // ゴースト生成
    createTouchGhost(_touchDrag.title, startX, startY, kind);
    showDragTimeLabel(startX,startY,'');
  },250);
  // 移動・終了リスナーを一時登録
  el._touchMove=(ev)=>onEvTouchMove(ev);
  el._touchEnd=(ev)=>onEvTouchEnd(ev,el);
  document.addEventListener('touchmove',el._touchMove,{passive:false});
  document.addEventListener('touchend',el._touchEnd);
  document.addEventListener('touchcancel',el._touchEnd);
  // 長押し前に少し動いたらキャンセル（スクロールとして扱う）
  el._touchStartXY=[startX,startY];
}

function createTouchGhost(title, x, y, kind){
  const g=document.createElement('div');
  g.className='touch-drag-ghost';
  const colors=kind==='task'?{bg:'#2a1f08',bd:'#E0A040',tx:'#f0d090'}:{bg:'#1a3a60',bd:'#4A9EE0',tx:'#a8d4f5'};
  g.style.background=colors.bg; g.style.borderLeft='3px solid '+colors.bd; g.style.color=colors.tx;
  g.textContent=title||'予定';
  g.style.left=(x+12)+'px'; g.style.top=(y-20)+'px';
  document.body.appendChild(g);
  if(_touchDrag) _touchDrag.ghost=g;
}

function onEvTouchMove(e){
  // 長押し前の微小移動 → ドラッグ未開始ならキャンセル（通常スクロール）
  if(!_touchDrag||!_touchDrag.started){
    return; // まだ掴んでいない
  }
  e.preventDefault(); // ドラッグ中はスクロール抑止
  const touch=e.touches[0];
  const x=touch.clientX, y=touch.clientY;
  // ゴースト移動
  if(_touchDrag.ghost){ _touchDrag.ghost.style.left=(x+12)+'px'; _touchDrag.ghost.style.top=(y-20)+'px'; }
  // 下の要素を判定
  const target=document.elementFromPoint(x,y);
  const col=target?target.closest('.cal-day-col,.cal-allday-cell'):null;
  // ハイライト更新
  document.querySelectorAll('.cal-drop-target').forEach(el=>el.classList.remove('cal-drop-target'));
  if(col){
    col.classList.add('cal-drop-target');
    const ds=col.dataset.date||'';
    if(col.classList.contains('cal-allday-cell')){
      showDragTimeLabel(x,y,`${ds} 終日`);
    }else{
      const startMin=calcDropStartMin(col,y);
      showDragTimeLabel(x,y,`${ds.slice(5)} ${minToTime(startMin)}`);
    }
  }
  handleAutoScroll(y);
}

function onEvTouchEnd(e, el){
  clearTimeout(_touchHoldTimer);
  // リスナー解除
  if(el._touchMove){ document.removeEventListener('touchmove',el._touchMove,{passive:false}); }
  if(el._touchEnd){ document.removeEventListener('touchend',el._touchEnd); document.removeEventListener('touchcancel',el._touchEnd); }
  stopAutoScroll();
  if(!_touchDrag||!_touchDrag.started){
    // ドラッグ未開始 → 通常タップとして扱う（onclickが発火する）
    _touchDrag=null; _calDrag=null;
    return;
  }
  // ドロップ処理
  const touch=(e.changedTouches&&e.changedTouches[0])||null;
  if(touch){
    const target=document.elementFromPoint(touch.clientX,touch.clientY);
    const col=target?target.closest('.cal-day-col,.cal-allday-cell'):null;
    if(col){
      const ds=col.dataset.date||'';
      if(col.classList.contains('cal-allday-cell')){
        applyCalMove(ds,'',true);
      }else{
        const startMin=calcDropStartMin(col,touch.clientY);
        applyCalMove(ds, minToTime(startMin), false);
      }
    }
  }
  // 後始末
  el.classList.remove('touch-dragging');
  document.querySelectorAll('.cal-drop-target').forEach(x=>x.classList.remove('cal-drop-target'));
  if(_touchDrag&&_touchDrag.ghost) _touchDrag.ghost.remove();
  hideDragTimeLabel();
  _touchDrag=null; _calDrag=null;
  // ドラッグ後の誤タップ防止
  e.preventDefault&&e.preventDefault();
}
function onEvDragOver(e){
  if(!_calDrag) return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('cal-drop-target');
  // ドロップ先の開始時刻を計算してラベル表示
  const col=e.currentTarget;
  const ds=col.dataset.date||'';
  if(col.classList.contains('cal-allday-cell')){
    showDragTimeLabel(e.clientX,e.clientY,`${ds} 終日`);
    return;
  }
  const startMin=calcDropStartMin(col,e.clientY);
  showDragTimeLabel(e.clientX,e.clientY,`${ds.slice(5)} ${minToTime(startMin)}`);
  // 画面端でのオートスクロール
  handleAutoScroll(e.clientY);
}
function onEvDragLeave(e){
  e.currentTarget.classList.remove('cal-drop-target');
  stopAutoScroll();
}

// ドロップ先の開始時刻(分)を算出（グラブオフセット補正＋15分スナップ）
function calcDropStartMin(col, clientY){
  const rect=col.getBoundingClientRect();
  const y=clientY-rect.top;
  // つかんだ位置の補正：マウス位置からグラブ分を引いてブロック上端を求める
  const grabMin=_calDrag?(_calDrag.grabMin||0):0;
  let rawMin=(y/HOUR_PX)*60 + CAL_S_H*60 - grabMin;
  rawMin=Math.round(rawMin/15)*15; // 15分スナップ
  return Math.max(CAL_S_H*60,Math.min((CAL_E_H-1)*60+45,rawMin));
}

// 時間グリッドへのドロップ → 日付＋時刻変更
function onEvDrop(e, dateStr){
  e.preventDefault();
  e.currentTarget.classList.remove('cal-drop-target');
  stopAutoScroll();
  if(!_calDrag) return;
  const startMin=calcDropStartMin(e.currentTarget, e.clientY);
  applyCalMove(dateStr, minToTime(startMin), false);
}

// ドラッグ中の時刻表示ラベル
let _dragLabelEl=null;
function showDragTimeLabel(x,y,text){
  if(!_dragLabelEl){
    _dragLabelEl=document.createElement('div');
    _dragLabelEl.id='cal-drag-label';
    document.body.appendChild(_dragLabelEl);
  }
  _dragLabelEl.textContent=text||'';
  _dragLabelEl.style.display=text?'block':'none';
  if(!text) return;
  // マウスから十分離して表示（ドラッグ中の半透明ゴーストと重ならないように）
  const lw=_dragLabelEl.offsetWidth||120;
  const lh=_dragLabelEl.offsetHeight||34;
  let left=x+32;            // 右に大きくオフセット
  let top=y-lh-16;          // カーソルの上に表示
  if(left+lw>window.innerWidth-8) left=x-lw-32; // 右端で見切れる→左へ
  if(top<8) top=y+24;       // 上端で見切れる→下へ
  _dragLabelEl.style.left=Math.max(8,left)+'px';
  _dragLabelEl.style.top=top+'px';
}
function hideDragTimeLabel(){
  if(_dragLabelEl){ _dragLabelEl.style.display='none'; }
}

// 終日セルへのドロップ → 終日に変更
function onEvDropAllday(e, dateStr){
  e.preventDefault();
  e.currentTarget.classList.remove('cal-drop-target');
  if(!_calDrag) return;
  applyCalMove(dateStr, '', true);
}

// 移動を反映
function applyCalMove(dateStr, startTime, toAllday){
  // 現在のスクロール位置を保存して、再描画後も維持
  const sc=document.getElementById('cal-grid-scroll');
  if(sc) _calSavedScrollTop=sc.scrollTop;
  const d=_calDrag; _calDrag=null;
  if(d.kind==='task'){
    const t=tasks.find(x=>String(x.id)===String(d.id));
    if(!t) return;
    t.actionDate=dateStr;
    if(toAllday){
      t.actionTime=''; t.actionEndTime='';
    }else{
      t.actionTime=startTime;
      // 元の継続時間を維持。なければ終了時刻はそのまま空
      if(d.durMin>0){
        const[sh,sm]=startTime.split(':').map(Number);
        t.actionEndTime=minToTime(sh*60+sm+d.durMin);
      }else{
        t.actionEndTime='';
      }
    }
    scheduleSave();
    renderCalView();
    if(currentTab==='tasks') renderTasks();
    showToast(`✓ 「${t.action||t.name}」を${dateStr}${toAllday?'（終日）':' '+startTime}に移動`);
  }else{
    const ev=calEvents.find(x=>String(x.id)===String(d.id));
    if(!ev) return;
    // 繰り返し予定は基準日ごと移動（確認）
    if(ev.repeat&&ev.repeat!=='none'){
      if(!confirm('繰り返し予定です。この予定の基準日ごと移動しますか？\n（個別の回だけの移動はできません）')){ renderCalView(); return; }
    }
    ev.date=dateStr;
    if(toAllday){
      ev.allDay=true; ev.startTime=''; ev.endTime='';
    }else{
      ev.allDay=false;
      ev.startTime=startTime;
      if(d.durMin>0){
        const[sh,sm]=startTime.split(':').map(Number);
        ev.endTime=minToTime(sh*60+sm+d.durMin);
      }
    }
    ev.updatedAt=nowISO();
    scheduleSave();
    renderCalView();
    scheduleAlerts();
    showToast(`✓ 「${ev.title}」を${dateStr}${toAllday?'（終日）':' '+startTime}に移動`);
  }
}

/* ═══════════════════════════════════════
   月ビュー
═══════════════════════════════════════ */
function renderMonthView(){
  const inner=document.getElementById('cal-grid-inner');
  if(!inner) return;
  const d0=new Date(calBaseDate); d0.setDate(1);
  const y=d0.getFullYear(),m=d0.getMonth();
  const todayStr=today();
  const firstDow=d0.getDay(); // 0=日
  const daysInMonth=new Date(y,m+1,0).getDate();
  const DOW=['日','月','火','水','木','金','土'];

  // 全表示日付（前月末〜翌月頭）
  const allDates=[];
  for(let i=0;i<firstDow;i++){
    const prev=new Date(y,m,1-firstDow+i);
    allDates.push({d:prev,other:true});
  }
  for(let i=1;i<=daysInMonth;i++) allDates.push({d:new Date(y,m,i),other:false});
  const remaining=(7-allDates.length%7)%7;
  for(let i=1;i<=remaining;i++) allDates.push({d:new Date(y,m+1,i),other:true});

  // イベント収集
  const allDateStrs=allDates.map(x=>calDateStr(x.d));
  const evsByDate={};
  allDateStrs.forEach(ds=>{ evsByDate[ds]=[]; });
  calEvents.forEach(ev=>{
    expandRepeat(ev,allDateStrs).forEach(ds=>{
      evsByDate[ds].push({...ev,_isTask:false});
    });
  });
  // ※次回アクションの自動表示は廃止（カレンダーに反映ボタンで予定登録）

  let html=`<div style="display:grid;grid-template-columns:repeat(7,1fr);min-width:600px">`;
  DOW.forEach((dow,i)=>{
    const cls=i===0?'sun':i===6?'sat':'';
    html+=`<div class="cal-month-head-cell${cls?' '+cls:''}">${dow}</div>`;
  });
  allDates.forEach(({d,other})=>{
    const ds=calDateStr(d);
    const isToday=ds===todayStr;
    const evs=(evsByDate[ds]||[]).slice().sort((a,b)=>{
      // 終日を先頭、その後は開始時刻順
      const aAll=a.allDay||!a.startTime, bAll=b.allDay||!b.startTime;
      if(aAll&&!bAll) return -1;
      if(!aAll&&bAll) return 1;
      return (a.startTime||'')>(b.startTime||'')?1:(a.startTime||'')<(b.startTime||'')?-1:0;
    });
    const visible=evs.slice(0,3);
    const more=evs.length-3;
    const todayCls=isToday?' is-today':'';
    const otherCls=other?' other-month':'';
    html+=`<div class="cal-month-cell${todayCls}${otherCls}" onclick="calJumpTo('${ds}',true)">
      <div class="cal-month-day-num">${d.getDate()}</div>`;
    visible.forEach(ev=>{
      const col=ev._isTask?(TASK_COLORS[ev.priority]||TASK_COLORS.mid):(EV_COLORS[ev.color]||EV_COLORS.blue);
      const clickFn=ev._isTask?`event.stopPropagation();openTaskM(${ev.taskId})`:`event.stopPropagation();showEvPopover(event,'${ev.id}')`;
      const monthProjTag=(ev._isTask&&ev.projName)?`<span style="opacity:.65;font-weight:400">[${esc(ev.projName)}] </span>`:'';
      const monthTitleAttr=(ev._isTask&&ev.projName)?`[${esc(ev.projName)}] ${esc(ev.title)}`:esc(ev.title);
      // 開始時刻（終日は時刻なし）
      const isAllDay=ev.allDay||!ev.startTime;
      const timeTag=isAllDay?'':`<span class="cal-month-ev-time">${ev.startTime}</span>`;
      const titleWithTime=isAllDay?monthTitleAttr:`${ev.startTime} ${monthTitleAttr}`;
      html+=`<div class="cal-month-ev" style="background:${col.bg};border-left:3px solid ${col.border};color:${col.text}" onclick="${clickFn}" title="${titleWithTime}">${timeTag}${monthProjTag}${esc(ev.title)}</div>`;
    });
    if(more>0) html+=`<div class="cal-month-more" onclick="event.stopPropagation();calJumpTo('${ds}',true)">他${more}件</div>`;
    html+=`</div>`;
  });
  html+='</div>';
  inner.innerHTML=html;
  inner.style.minWidth='600px';
}

/* ═══════════════════════════════════════
   グリッドクリックで時刻推定新規追加
═══════════════════════════════════════ */
function handleCalClick(e, dateStr){
  if(e.target.closest('.cal-ev')||e.target.closest('.cal-allday-ev')) return;
  const col=e.currentTarget;
  const rect=col.getBoundingClientRect();
  const scroll=document.getElementById('cal-grid-scroll');
  const scrollOffset=scroll?scroll.scrollTop:0;
  // ヘッダー高さを概算で除外（sticky行の高さ）
  const headHeight=col.getBoundingClientRect().top - (scroll?scroll.getBoundingClientRect().top:0) + scrollOffset;
  const y=e.clientY - rect.top;
  const rawH=y/HOUR_PX+CAL_S_H;
  const h=Math.max(CAL_S_H,Math.min(CAL_E_H-1,Math.floor(rawH)));
  const m=Math.floor((rawH%1)*2)*30;
  openEvM(null, dateStr, `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
}

/* ═══════════════════════════════════════
   ポップオーバー
═══════════════════════════════════════ */
function showEvPopover(e, evId){
  e.stopPropagation();
  const ev=calEvents.find(x=>String(x.id)===String(evId));
  if(!ev) return;
  const col=EV_COLORS[ev.color]||EV_COLORS.blue;
  const pop=document.getElementById('ev-popover');
  const repeat_labels={none:'',daily:'毎日',weekly:'毎週',biweekly:'隔週',monthly:'毎月（日付）',monthlyNth:ev.date?('毎月'+nthWeekdayLabel(ev.date)):'毎月（第◯曜日）',yearly:'毎年'};
  let body=`<div class="ev-popover-head">
    <div class="ev-popover-color" style="background:${col.border}"></div>
    <div class="ev-popover-title">${esc(ev.title||'（タイトルなし）')}</div>
    <div class="ev-popover-btns">
      <button class="ev-popover-btn" onclick="openEvM('${ev.id}',null,null)" title="編集"><i class="ti ti-pencil"></i></button>
      <button class="ev-popover-btn" onclick="deleteEvById('${ev.id}')" title="削除" style="color:var(--red)"><i class="ti ti-trash"></i></button>
      <button class="ev-popover-btn" onclick="closeEvPopover()" title="閉じる"><i class="ti ti-x"></i></button>
    </div>
  </div><div class="ev-popover-body">`;
  const timeStr=ev.allDay?'終日':(ev.startTime+(ev.endTime?` 〜 ${ev.endTime}`:''));
  body+=`<div class="ev-popover-row"><i class="ti ti-clock"></i><span><strong>${ev.date}</strong> ${timeStr}</span></div>`;
  if(ev.repeat&&ev.repeat!=='none') body+=`<div class="ev-popover-row"><i class="ti ti-refresh"></i><span>${repeat_labels[ev.repeat]}${ev.repeatEnd?` （〜${ev.repeatEnd}）`:''}</span></div>`;
  if(ev.alert!==''&&ev.alert!=null) body+=`<div class="ev-popover-row"><i class="ti ti-bell"></i><span>${ev.alert==='0'?'予定時刻に通知':`${ev.alert}分前に通知`}</span></div>`;
  if(ev.memo) body+=`<div class="ev-popover-row"><i class="ti ti-notes"></i><span style="white-space:pre-wrap">${esc(ev.memo)}</span></div>`;
  body+='</div>';
  pop.innerHTML=body;
  pop.style.display='block';
  // 位置計算
  const rect=e.target.closest('.cal-ev,.cal-allday-ev,.cal-month-ev')?.getBoundingClientRect()||{left:e.clientX,top:e.clientY,width:0,height:0};
  const pw=300,ph=200;
  let left=rect.left+rect.width+8;
  let top=rect.top;
  if(left+pw>window.innerWidth) left=rect.left-pw-8;
  if(top+ph>window.innerHeight) top=window.innerHeight-ph-8;
  pop.style.left=Math.max(8,left)+'px';
  pop.style.top=Math.max(8,top)+'px';
  setTimeout(()=>document.addEventListener('click',closeEvPopoverOutside,{once:true}),0);
}
function closeEvPopover(){
  document.getElementById('ev-popover').style.display='none';
}
function closeEvPopoverOutside(e){
  const pop=document.getElementById('ev-popover');
  if(pop&&!pop.contains(e.target)) pop.style.display='none';
}
function deleteEvById(id){
  closeEvPopover();
  if(!confirm('この予定を削除しますか？')) return;
  calEvents=calEvents.filter(e=>String(e.id)!==String(id));
  scheduleSave(); renderCalView(); scheduleAlerts();
  showToast('✓ 予定を削除しました');
}

/* ═══════════════════════════════════════
   予定モーダル CRUD
═══════════════════════════════════════ */
function openEvM(id, dateStr, startTime){
  closeEvPopover();
  editEvId=id;
  document.getElementById('ev-mttl').textContent=id?'予定を編集':'予定を追加';
  document.getElementById('fld-ev-title').classList.remove('err');
  document.getElementById('ev-del-btn').style.display=id?'':'none';
  if(id){
    const ev=calEvents.find(e=>String(e.id)===String(id));if(!ev)return;
    document.getElementById('ev-title').value=ev.title||'';
    document.getElementById('ev-memo').value=ev.memo||'';
    document.getElementById('ev-date').value=ev.date;
    document.getElementById('ev-allday').checked=!!ev.allDay;
    document.getElementById('ev-start').value=ev.startTime||'';
    document.getElementById('ev-end').value=ev.endTime||'';
    document.getElementById('ev-alert').value=ev.alert!=null?String(ev.alert):'15';
    document.getElementById('ev-rpt-end').value=ev.repeatEnd||'';
    currentEvColor=ev.color||'blue'; currentEvRepeat=ev.repeat||'none';
  } else {
    document.getElementById('ev-title').value='';
    document.getElementById('ev-memo').value='';
    document.getElementById('ev-date').value=dateStr||calDateStr(calBaseDate);
    document.getElementById('ev-allday').checked=false;
    document.getElementById('ev-start').value=startTime||'09:00';
    document.getElementById('ev-end').value=startTime?calcEndTime(startTime,60):'10:00';
    document.getElementById('ev-alert').value='15';
    document.getElementById('ev-rpt-end').value='';
    currentEvColor='blue'; currentEvRepeat='none';
  }
  toggleEvAllDay(); setRepeat(currentEvRepeat); setEvColor(currentEvColor);
  document.getElementById('ev-ov').classList.add('open');
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}
function calcEndTime(s,mins){const[h,m]=s.split(':').map(Number);const t=h*60+m+mins;return`${String(Math.floor(t/60)%24).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;}
function closeEvM(){document.getElementById('ev-ov').classList.remove('open');editEvId=null;}
function toggleEvAllDay(){document.getElementById('ev-time-row').style.display=document.getElementById('ev-allday').checked?'none':'';}
function setRepeat(r){
  currentEvRepeat=r;
  ['none','daily','weekly','biweekly','monthly','monthlyNth','yearly'].forEach(k=>{
    const btn=document.getElementById('rpt-'+k); if(btn) btn.classList.toggle('sel',k===r);
  });
  document.getElementById('ev-rpt-end-row').style.display=r==='none'?'none':'';
  // 第◯曜日のヒント表示
  const hint=document.getElementById('ev-rpt-nth-hint');
  if(hint){
    if(r==='monthlyNth'){
      const dateVal=document.getElementById('ev-date').value;
      hint.textContent=dateVal?`毎月の「${nthWeekdayLabel(dateVal)}」に繰り返します`:'日付を選択すると第◯曜日が決まります';
      hint.style.display='';
    }else{
      hint.style.display='none';
    }
  }
}
function setEvColor(color){
  currentEvColor=color;
  document.querySelectorAll('.ev-color-swatch').forEach(el=>el.classList.toggle('sel',el.dataset.color===color));
}
function saveEv(){
  const date=document.getElementById('ev-date').value;
  if(!date){document.getElementById('fld-ev-title').classList.add('err');return;}
  const allDay=document.getElementById('ev-allday').checked;
  const data={
    title:document.getElementById('ev-title').value.trim()||'（タイトルなし）',
    memo:document.getElementById('ev-memo').value.trim(),
    date, allDay,
    startTime:allDay?'':document.getElementById('ev-start').value,
    endTime:allDay?'':document.getElementById('ev-end').value,
    repeat:currentEvRepeat,
    repeatEnd:document.getElementById('ev-rpt-end').value||'',
    alert:document.getElementById('ev-alert').value,
    color:currentEvColor,
    updatedAt:nowISO(),
  };
  if(editEvId){
    const i=calEvents.findIndex(e=>String(e.id)===String(editEvId));
    calEvents[i]={...calEvents[i],...data};
  } else {
    calEvents.push({id:ceNid++,createdAt:nowISO(),...data});
  }
  closeEvM(); scheduleSave(); renderCalView(); scheduleAlerts();
  showToast('✓ 予定を保存しました');
}
function deleteEvConfirm(){
  if(!editEvId) return;
  if(!confirm('この予定を削除しますか？')) return;
  calEvents=calEvents.filter(e=>String(e.id)!==String(editEvId));
  closeEvM(); scheduleSave(); renderCalView(); scheduleAlerts();
  showToast('✓ 予定を削除しました');
}

/* ═══════════════════════════════════════
   ブラウザ通知アラート
═══════════════════════════════════════ */
function scheduleAlerts(){
  _alertTimers.forEach(t=>clearTimeout(t)); _alertTimers=[];
  if(!('Notification' in window)) return;
  const now=Date.now();
  calEvents.forEach(ev=>{
    if(ev.alert===''||ev.alert==null||ev.allDay||!ev.startTime) return;
    const mins=parseInt(ev.alert); if(isNaN(mins)) return;
    for(let i=0;i<8;i++){
      const ds=localDateStr(new Date(now+i*86400000));
      if(expandRepeat(ev,[ds]).length===0) continue;
      const fire=new Date(`${ds}T${ev.startTime}:00`).getTime()-mins*60000;
      const diff=fire-now;
      if(diff<0||diff>8*86400000) continue;
      const t=setTimeout(()=>{
        // 通知許可済みのときのみ発火（毎回の許可リクエストはしない）
        if(Notification.permission==='granted'){
          const label=mins===0?'予定の時刻です':`${mins}分後に予定があります`;
          new Notification(ev.title||'予定',{body:`${label}\n${ds} ${ev.startTime}${ev.endTime?'〜'+ev.endTime:''}`});
        }
      },diff);
      _alertTimers.push(t);
    }
  });
}
async function requestNotifPerm(){
  if(!('Notification' in window)){showToast('このブラウザは通知非対応です','error');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){showToast('✓ 通知を許可しました');scheduleAlerts();}
  else showToast('通知が拒否されています。ブラウザ設定を確認してください','error');
}

/* ═══════════════════════════════════════
   PWA: Service Worker登録 & インストール促進
═══════════════════════════════════════ */
(function setupPWA(){
  // Service Worker（オフラインキャッシュ）。https配信時のみ動作。file://では何もしない
  if('serviceWorker' in navigator && location.protocol==='https:'){
    // インラインSWをBlob URLで登録
    const swCode=`
      const CACHE='pm-cache-v1';
      self.addEventListener('install',e=>{self.skipWaiting();});
      self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
      self.addEventListener('fetch',e=>{
        // ネットワーク優先・失敗時キャッシュ（オフライン時に最後の画面を表示）
        e.respondWith(
          fetch(e.request).then(res=>{
            if(e.request.method==='GET' && res.ok){
              const clone=res.clone();
              caches.open(CACHE).then(c=>c.put(e.request,clone));
            }
            return res;
          }).catch(()=>caches.match(e.request))
        );
      });
    `;
    try{
      const blob=new Blob([swCode],{type:'text/javascript'});
      const swUrl=URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(()=>{});
    }catch(e){}
  }

  // インストール促進バナー（Android Chrome等）
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',(e)=>{
    e.preventDefault();
    deferredPrompt=e;
    showInstallBanner();
  });
  window.showInstallBanner=function(){
    let bar=document.getElementById('pwa-install-banner');
    if(!bar){
      bar=document.createElement('div');
      bar.id='pwa-install-banner';
      const icon=document.querySelector('link[rel="apple-touch-icon"]')?.href||'';
      bar.innerHTML=`<img class="pwa-icon" src="${icon}" alt="">
        <div class="pwa-text"><div class="pwa-title">ホーム画面に追加</div><div class="pwa-sub">アプリのように使えます</div></div>
        <button onclick="installPWA()" style="background:var(--blue);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px;flex-shrink:0">追加</button>
        <button onclick="document.getElementById('pwa-install-banner').classList.remove('show')" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;flex-shrink:0">×</button>`;
      document.body.appendChild(bar);
    }
    bar.classList.add('show');
  };
  window.installPWA=async function(){
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
    const bar=document.getElementById('pwa-install-banner');
    if(bar) bar.classList.remove('show');
  };
  // インストール済みなら何もしない
  window.addEventListener('appinstalled',()=>{
    const bar=document.getElementById('pwa-install-banner');
    if(bar) bar.classList.remove('show');
  });
})();

// 通知をデフォルトで有効化（初回のみ許可をリクエスト）
(function initNotifications(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    // ユーザー操作直後でないと一部ブラウザでブロックされるため、
    // 最初のクリック時に一度だけ許可をリクエスト
    const askOnce=()=>{
      Notification.requestPermission().then(p=>{
        if(p==='granted') scheduleAlerts();
      });
      document.removeEventListener('click',askOnce);
    };
    document.addEventListener('click',askOnce,{once:true});
  }
})();
