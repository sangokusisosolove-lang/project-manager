<style>
*{box-sizing:border-box;margin:0;padding:0}
/* PWA standalone時のセーフエリア（ノッチ・ステータスバー） */
@media (display-mode: standalone){
  .pane-right-head{padding-top:calc(10px + env(safe-area-inset-top,0)) !important}
  .pane-left-head{padding-top:calc(14px + env(safe-area-inset-top,0))}
}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:#1a1a1a;color:#f0f0f0;min-height:100vh}
:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#606060;
  --border:#3a3a3a;--border2:#2e2e2e;
  --blue:#4A9EE0;--blue-bg:#1a2e40;--green:#3DB88A;--red:#E05555;--yellow:#E0A040;
  --radius:6px;--radius-lg:10px;
}

/* ── レイアウト ── */
.layout{display:grid;grid-template-columns:300px 1fr;height:100vh;overflow:hidden;transition:grid-template-columns .2s ease}
.layout.collapsed{grid-template-columns:0 1fr}
.layout.collapsed .pane-left{opacity:0;pointer-events:none}
/* 折りたたみ/展開ボタン */
.pane-collapse-btn{background:none;border:none;cursor:pointer;color:var(--text2);width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:background .15s,color .15s;flex-shrink:0}
.pane-collapse-btn:hover{background:var(--bg3);color:var(--text)}
#pane-expand-btn{display:none}
.layout.collapsed #pane-expand-btn{display:flex}

/* ── 左ペイン ── */
.pane-left{background:var(--bg);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.pane-left-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.pane-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;margin-bottom:10px}
.pane-left-search{position:relative}
.pane-left-search i{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.pane-left-search input{width:100%;padding:6px 8px 6px 26px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:12px;font-family:inherit}
.proj-list{flex:1;overflow-y:auto;padding:8px}
.proj-group-label{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 5px;margin-top:4px}
.proj-group-label:first-child{margin-top:0}
.proj-card{padding:10px 12px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--bg2);margin-bottom:6px;cursor:pointer;transition:border-color .15s,background .15s}
.proj-card:hover{border-color:var(--text2);background:var(--bg3)}
.proj-card.active{border-color:var(--text);background:var(--bg)}
.proj-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.proj-alert-badge{display:inline-flex;align-items:center;gap:2px;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
.proj-alert-badge.ov{background:#3D1515;color:#F08080}
.proj-alert-badge.today{background:#1a2e40;color:#4A9EE0}
.proj-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.proj-card-date{font-size:11px;color:var(--text2)}
.proj-card-date.date-ov{color:var(--red)}
.proj-add-btn{margin:8px;padding:8px;border:1px dashed var(--border);border-radius:var(--radius-lg);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;width:calc(100% - 16px)}
.proj-add-btn:hover{background:var(--bg2);color:var(--text)}
.proj-empty{text-align:center;padding:2rem 1rem;color:var(--text2);font-size:13px}

/* ── 右ペイン ── */
.pane-right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.pane-right-head{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.proj-detail-name{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.proj-detail-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-detail-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.head-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap;transition:background .15s,color .15s}
.head-btn:hover{background:var(--border);color:var(--text)}
.head-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.head-btn.primary:hover{opacity:.85}
.head-btn.spinning i{animation:spin .8s linear infinite}

.task-area{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}
.task-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:120px;max-width:200px}
.sw i{position:absolute;left:7px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.sw input{width:100%;padding:5px 8px 5px 26px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit}
.fsel{padding:4px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer}
.tb-btn{padding:4px 9px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;display:flex;align-items:center;gap:3px;font-family:inherit}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.active{border-color:var(--text);color:var(--text);font-weight:600}
.tl-sep{width:1px;height:16px;background:var(--border2)}

/* ── タスクカード ── */
.task-cards{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;transition:border-color .15s,opacity .15s,transform .15s,box-shadow .15s;cursor:default}
.task-card.done-card{opacity:.45}

/* D&D スタイル */
.task-card[draggable="true"]{cursor:grab}
.task-card[draggable="true"]:active{cursor:grabbing}
.task-card.drag-over{border-color:var(--blue);background:var(--blue-bg);transform:scale(1.01);box-shadow:0 4px 16px rgba(74,158,224,.2)}
.task-card.dragging{opacity:.35;transform:scale(.98)}
.drag-handle{color:var(--text3);cursor:grab;display:flex;align-items:center;padding:2px 0;font-size:14px;transition:color .15s}
.drag-handle:hover{color:var(--text2)}

.task-ck{width:15px;height:15px;cursor:pointer;accent-color:var(--text);margin-top:2px;flex-shrink:0}
.task-body{min-width:0}
.task-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.task-name.dk{text-decoration:line-through;color:var(--text2)}
.task-detail{font-size:12px;color:var(--text2);line-height:1.45;margin-bottom:5px}
.task-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text2)}
.chip.chip-ov{background:#3D1515;border-color:#5a2020;color:#F08080}
.chip.chip-today{background:#1a2e40;border-color:#2a4e70;color:#4A9EE0;font-weight:600}
.chip.chip-tomorrow{background:#2e2810;border-color:#4e4520;color:#E0A040;font-weight:600}
.chip.action-dt{background:#1a2e40;border-color:#2a4e70;color:#4A9EE0}
.pb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.ph{background:#3D1515;color:#F08080}.pm{background:#3D2E0A;color:#E0A040}.pl{background:#1A2E10;color:#70C060}
.task-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ib{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:6px;font-size:18px;line-height:1;display:flex;transition:color .15s,background .15s}
.ib:hover{color:var(--text);background:var(--bg3)}
.ib.cal-btn{color:var(--blue)}.ib.cal-btn:hover{background:var(--blue-bg);color:#fff}
.ib.memo-btn{color:var(--yellow)}.ib.memo-btn:hover{background:#2e2000;color:#E0A040}

.task-empty{text-align:center;padding:3rem;color:var(--text2);font-size:13px}
.no-proj{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);font-size:14px;flex-direction:column;gap:10px}

/* stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--bg3);border-radius:var(--radius);padding:9px 12px;border:1px solid var(--border)}
.sc-l{font-size:10px;color:var(--text2);margin-bottom:3px}
.sc-v{font-size:18px;font-weight:700;line-height:1}

/* ── モーダル共通 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--radius-lg);border:1px solid var(--border);width:500px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;background:var(--bg3);border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.mh-t{font-size:15px;font-weight:700;color:var(--text)}
.mc{background:none;border:none;cursor:pointer;color:var(--text2);font-size:17px;padding:3px;border-radius:4px;display:flex}
.mc:hover{color:var(--text);background:var(--bg2)}
.mb{padding:0 1.4rem 1.1rem;display:flex;flex-direction:column;gap:12px;margin-top:1.1rem}
.mdiv{height:1px;background:var(--border)}
.msec{font-size:11px;font-weight:700;color:var(--text2);padding:6px 0 2px;border-top:1px solid var(--border);margin-top:2px;letter-spacing:.4px;text-transform:uppercase}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:.9rem 1.4rem}
.fl label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.fl input,.fl select,.fl textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;line-height:1.5}
.fl input:focus,.fl select:focus,.fl textarea:focus{outline:none;border-color:var(--blue)}
.fl select option{background:var(--bg3);color:var(--text)}
.fl textarea{resize:vertical;min-height:62px}
.fl.err input,.fl.err textarea{border-color:#E24B4A}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fhint{font-size:10px;color:var(--text3);margin-top:3px}
.bcnl{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit}
.bcnl:hover{background:var(--border2)}
.bsv{padding:8px 16px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.bsv:hover{opacity:.85}

/* バッジ */
.cbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
.ca{background:#1E1A3D;color:#9D8FE8}.cb2{background:#0D2520;color:#5BCFAA}.cc{background:#2E200A;color:#D4900A}.cd{background:#2E1208;color:#E07050}.ce{background:#202020;color:#A0A0A0}

/* ── 空き時間モーダル ── */
.free-modal{width:420px}
.free-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.free-opt label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.free-opt select,.free-opt input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit}
.free-search-btn{padding:9px;border:none;border-radius:var(--radius);background:var(--blue);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.free-search-btn:hover{opacity:.85}
.free-search-btn:disabled{opacity:.4;cursor:not-allowed}
.free-slot{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);font-size:13px;color:var(--text)}
.free-slot-time{font-weight:600}
.free-slot-use{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg3);color:var(--text);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.free-slot-use:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.free-results{display:flex;flex-direction:column;gap:6px}
.free-results-label{font-size:12px;color:var(--text2);font-weight:600;margin-bottom:2px}
.free-empty{text-align:center;padding:1.5rem;color:var(--text3);font-size:13px}

/* ── ローディング・トースト ── */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-size:14px;color:var(--text2)}
.spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#3a3a3a;color:#f0f0f0;border:1px solid var(--border);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── タブ ── */
.view-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.view-tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;display:flex;align-items:center;gap:6px;transition:color .15s}
.view-tab:hover{color:var(--text);background:var(--bg3)}
.view-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.action-view{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}

/* ── アクション一覧 ── */
.action-group{margin-bottom:20px}
.action-group-label{font-size:17px;font-weight:700;color:var(--text2);letter-spacing:.3px;padding:2px 4px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.action-group-label.today{color:var(--blue)}
.action-group-label.overdue{color:var(--red)}
.action-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 14px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.action-item.overdue-item{border-color:#5a2020;background:#2a1515}
.action-item.today-item{border-color:#1a4060;background:#0d2030}
.action-item-proj{font-size:10px;color:var(--text2);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.action-item-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.action-item-action{font-size:12px;color:var(--blue);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.action-item-chips{display:flex;gap:5px;flex-wrap:wrap}
.action-item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.action-empty{text-align:center;padding:3rem;color:var(--text2);font-size:13px}

/* ── アーカイブ ── */
.archive-section{border-top:1px solid var(--border2);flex-shrink:0}
.archive-toggle{width:100%;padding:10px 14px;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);display:flex;align-items:center;gap:6px;text-align:left;border-radius:var(--radius)}
.archive-toggle:hover{background:var(--bg3);color:var(--text)}
.archive-list{display:none;padding:0 8px 8px}
.archive-list.open{display:block}
.proj-card.archived{opacity:.55;background:var(--bg3)}
.proj-card.archived:hover{opacity:.85}
.task-archive-section{margin-top:12px;border-top:1px solid var(--border2)}
.task-archive-toggle{width:100%;padding:9px 4px;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);display:flex;align-items:center;gap:6px;text-align:left;border-radius:var(--radius)}
.task-archive-toggle:hover{color:var(--text);background:var(--bg3)}
.task-archive-list{display:none;margin-top:4px}
.task-archive-list.open{display:flex;flex-direction:column;gap:6px}

/* ── アクション一覧フィルター ── */
.action-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.action-toolbar .sw{max-width:180px}

/* ═══════════════════════════════
   メモ機能
═══════════════════════════════ */
.memo-view{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);isolation:isolate}
.memo-toolbar{padding:12px 16px 10px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.memo-split{flex:1;display:flex;overflow:hidden}
.memo-list-pane{width:340px;flex-shrink:0;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;border-right:1px solid var(--border)}
.memo-detail-pane{flex:1;overflow-y:auto;padding:28px 36px;background:var(--bg)}
.memo-list-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s}
.memo-list-item:hover{border-color:var(--text3);background:var(--bg3)}
.memo-list-item.active{border-color:var(--blue);background:var(--blue-bg)}
.memo-list-item-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.memo-list-item-preview{font-size:11px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.memo-list-item-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.memo-list-item-date{font-size:10px;color:var(--text3);margin-left:auto}
/* 詳細ペイン */
.memo-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:14px;gap:12px}
.memo-detail-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.memo-detail-title{font-size:24px;font-weight:700;color:var(--text);flex:1;line-height:1.35;word-break:break-word}
.memo-detail-actions{display:flex;gap:4px;flex-shrink:0}
.memo-detail-body{font-size:15px;color:var(--text);line-height:1.85;white-space:pre-wrap;word-break:break-word;margin-bottom:24px;min-height:120px}
.memo-md{white-space:normal;cursor:text;border-radius:6px;padding:8px 10px;margin-left:-10px;transition:background .12s}
.memo-md:hover{background:var(--bg2)}
.memo-md .md-h{margin:14px 0 6px;font-weight:700;line-height:1.4;border:none;padding:0}
.memo-md h3.md-h{font-size:20px}.memo-md h4.md-h{font-size:17px}.memo-md h5.md-h{font-size:15px;color:var(--text2)}
.memo-md .md-ul,.memo-md .md-ol{margin:4px 0 4px 4px;padding-left:20px}
.memo-md .md-ul li,.memo-md .md-ol li{margin:3px 0;line-height:1.7}
.memo-md .md-checklist{list-style:none;padding-left:2px;margin-left:0}
.memo-md .md-check{display:flex;align-items:flex-start;gap:7px;margin:4px 0}
.memo-md .md-checkbox{color:var(--text3);flex-shrink:0;line-height:1.5}
.memo-md .md-checkbox.checked{color:var(--green)}
.memo-md code{background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:13px;font-family:monospace}
.memo-md strong{font-weight:700;color:var(--text)}
.memo-edit-area{width:100%;min-height:160px;border:1px solid var(--blue);border-radius:6px;padding:10px 12px;margin-left:-10px;background:var(--bg2);color:var(--text);font-size:15px;line-height:1.85;font-family:inherit;resize:none;outline:none}
/* インライン編集 */
.memo-detail-title[contenteditable],.memo-detail-body[contenteditable]{border-radius:6px;padding:6px 10px;margin-left:-10px;transition:background .12s,box-shadow .12s;cursor:text;outline:none}
.memo-detail-title[contenteditable]:hover,.memo-detail-body[contenteditable]:hover{background:var(--bg2)}
.memo-detail-title[contenteditable]:focus,.memo-detail-body[contenteditable]:focus{background:var(--bg2);box-shadow:0 0 0 2px var(--blue)}
.memo-detail-title[contenteditable]:empty:before,.memo-detail-body[contenteditable]:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.memo-detail-body[contenteditable]{margin-left:-10px}
.memo-detail-meta{display:flex;flex-direction:column;gap:12px;padding-top:18px;border-top:1px solid var(--border)}
.memo-detail-meta-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2)}
.memo-detail-meta-row > i{font-size:16px;color:var(--text3);width:18px;flex-shrink:0}
.memo-detail-meta-row .label{color:var(--text3);min-width:70px}
.memo-detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.memo-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.memo-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;position:relative;transition:border-color .15s}
.memo-card:hover{border-color:var(--text3)}
.memo-card-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.memo-card-title{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;line-height:1.4}
.memo-card-actions{display:flex;gap:2px;flex-shrink:0}
.memo-card-body{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.memo-card-footer{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.memo-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer}
.memo-tag:hover{border-color:var(--text3);color:var(--text)}
.memo-tag.active-tag{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.memo-date{font-size:11px;color:var(--text3);margin-left:auto}
.memo-proj-ref{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.memo-proj-ref i{font-size:10px}
.memo-source-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;background:#1a2e40;border:1px solid #2a4e70;color:#4A9EE0}
.memo-source-chip.task-src{background:#1a2e1a;border-color:#2a502a;color:#3DB88A}
.memo-empty{text-align:center;padding:3rem;color:var(--text2);font-size:13px}
.memo-new-btn{padding:6px 14px;border:1px solid var(--blue);border-radius:var(--radius);background:transparent;color:var(--blue);cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.memo-new-btn:hover{background:var(--blue-bg)}
.memo-cnt{font-size:12px;color:var(--text3);margin-left:auto}

/* メモモーダル */
.memo-modal{width:560px}
.memo-modal .fl textarea{min-height:140px}
.tag-input-row{display:flex;gap:6px;align-items:center}
.tag-input-row input{flex:1}
.tag-add-btn{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.tag-add-btn:hover{background:var(--border);color:var(--text)}
.tag-preview{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.tag-preview-item{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.tag-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:0 1px}
.tag-remove:hover{color:var(--red)}
.memo-sort-group{display:flex;align-items:center;gap:5px}
.memo-sort-group label{font-size:11px;color:var(--text3);white-space:nowrap}

/* ── カレンダー確認モーダル ── */
.cal-confirm-modal{width:420px}
.cal-confirm-body{padding:1.2rem 1.4rem;display:flex;flex-direction:column;gap:12px}
.cal-confirm-msg{font-size:14px;color:var(--text);line-height:1.6}
.cal-confirm-detail{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:4px}
.cal-confirm-detail strong{color:var(--text);font-size:13px}
.cal-event-status{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.cal-event-status.registered{background:#0D2520;color:#3DB88A;border:1px solid #1a4030}
.cal-event-status.none{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.ib.cal-registered{color:var(--green)}
.ib.cal-registered:hover{background:#0D2520;color:#3DB88A}

/* ══════════════════════════════════════════
   Googleカレンダー風 週間カレンダー
══════════════════════════════════════════ */
.cal-view{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* ツールバー */
.cal-topbar{display:flex;align-items:center;padding:8px 16px;gap:12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.cal-fab{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:24px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);transition:box-shadow .15s,background .15s;font-family:inherit}
.cal-fab:hover{box-shadow:0 2px 8px rgba(0,0,0,.4);background:var(--border)}
.cal-fab i{font-size:18px;color:var(--blue)}
.cal-nav-group{display:flex;align-items:center;gap:2px}
.cal-nav-arrow{background:none;border:none;cursor:pointer;color:var(--text2);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.cal-nav-arrow:hover{background:var(--bg3)}
.cal-today-btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.cal-today-btn:hover{background:var(--border)}
.cal-period-label{font-size:18px;font-weight:600;color:var(--text);min-width:180px}
.cal-view-switcher{margin-left:auto;display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cal-vsw-btn{padding:6px 14px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);font-family:inherit;transition:background .15s,color .15s}
.cal-vsw-btn:hover{background:var(--border2);color:var(--text)}
.cal-vsw-btn.active{background:var(--blue);color:#fff}
.cal-settings-btn{width:32px;height:32px;background:none;border:none;cursor:pointer;color:var(--text2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s}
.cal-settings-btn:hover{background:var(--bg3)}

/* ── 週表示ラッパー ── */
.cal-week-wrap{flex:1;display:flex;overflow:hidden}
.cal-mini-pane{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cal-main-pane{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ミニカレンダー */
.cal-mini{padding:12px}
.cal-mini-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-mini-month{font-size:13px;font-weight:700;color:var(--text)}
.cal-mini-arrow{background:none;border:none;cursor:pointer;color:var(--text2);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .15s}
.cal-mini-arrow:hover{background:var(--bg3)}
.cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-mini-dow{font-size:10px;font-weight:700;text-align:center;color:var(--text3);padding:2px 0 4px}
.cal-mini-day{font-size:11px;text-align:center;padding:3px 2px;border-radius:50%;cursor:pointer;color:var(--text2);aspect-ratio:1;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .15s}
.cal-mini-day:hover{background:var(--bg3);color:var(--text)}
.cal-mini-day.other-month{color:var(--text3)}
.cal-mini-day.is-today{background:var(--blue);color:#fff;font-weight:700}
.cal-mini-day.in-view{background:var(--blue-bg);color:var(--blue)}
.cal-mini-day.is-today.in-view{background:var(--blue);color:#fff}
.cal-mini-sep{height:1px;background:var(--border);margin:10px 0}
.cal-mini-pane .cal-legend{padding:0 12px 12px}
.cal-mini-pane .cal-legend-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.cal-mini-pane .cal-legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);padding:3px 0}
.cal-mini-pane .cal-legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

/* メインカレンダーグリッド */
.cal-grid-scroll{flex:1;overflow:auto;position:relative}
.cal-grid{display:grid;min-width:600px}
.cal-grid.week-view{grid-template-columns:52px repeat(7,1fr)}
.cal-grid.day-view{grid-template-columns:52px 1fr}
.cal-grid.threeday-view{grid-template-columns:52px repeat(3,1fr)}

/* ヘッダー行（曜日・日付） */
.cal-head-row{display:contents}
.cal-head-gutter{position:sticky;top:0;z-index:12;background:var(--bg2);border-bottom:2px solid var(--border)}
.cal-col-head{position:sticky;top:0;z-index:11;background:var(--bg2);border-bottom:2px solid var(--border);padding:10px 4px 8px;text-align:center;cursor:pointer;user-select:none;transition:background .15s}
.cal-col-head:hover{background:var(--bg3)}
.cal-col-head .cal-dow{font-size:11px;font-weight:600;letter-spacing:.4px;color:var(--text3);margin-bottom:4px;text-transform:uppercase}
.cal-col-head .cal-day-num{font-size:22px;font-weight:400;color:var(--text2);width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.cal-col-head:hover .cal-day-num{background:var(--bg3)}
.cal-col-head.is-today .cal-dow{color:var(--blue)}
.cal-col-head.is-today .cal-day-num{background:var(--blue);color:#fff;font-weight:700}
.cal-col-head.sun .cal-dow,.cal-col-head.sun .cal-day-num:not(.is-today){color:#d07070}
.cal-col-head.sat .cal-dow,.cal-col-head.sat .cal-day-num:not(.is-today){color:#7090d0}

/* 終日行 */
.cal-allday-row{display:contents}
.cal-allday-gutter{background:var(--bg2);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);padding:4px 4px 4px 0;text-align:right;display:flex;align-items:flex-start;justify-content:flex-end}
.cal-allday-cell{background:var(--bg2);border-bottom:1px solid var(--border);border-right:1px solid var(--border2);min-height:28px;padding:2px 2px}
.cal-allday-ev{border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .12s}
.cal-allday-ev:hover{filter:brightness(1.2)}

/* 時間グリッド本体 */
.cal-body{display:contents}
.cal-time-col{border-right:1px solid var(--border2);position:sticky;left:0;z-index:5;background:var(--bg)}
.cal-time-cell{height:26px;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 6px 0;font-size:11px;color:#b8b8b8;font-weight:600;font-variant-numeric:tabular-nums;user-select:none}
.cal-time-cell.half{height:26px;border-bottom:1px dashed rgba(255,255,255,.05)}
.cal-day-col{border-right:1px solid var(--border2);position:relative;cursor:pointer}
.cal-day-col.is-today{background:rgba(74,158,224,.04)}
.cal-day-col.is-weekend{background:rgba(255,255,255,.01)}
.cal-hour-block{height:26px;border-bottom:1px solid var(--border2);pointer-events:none}
.cal-hour-block.half{height:26px;border-bottom:1px dashed rgba(255,255,255,.05)}
.cal-day-col:hover .cal-hover-indicator{display:block}

/* イベントブロック */
.cal-ev{position:absolute;border-radius:6px;padding:3px 6px;font-size:11px;overflow:hidden;cursor:pointer;z-index:3;transition:filter .12s,box-shadow .12s;line-height:1.35;box-sizing:border-box}
.cal-ev:hover{filter:brightness(1.18);box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:4}
.cal-ev[draggable="true"]{cursor:grab}
.cal-ev[draggable="true"]:active{cursor:grabbing}
.cal-ev-dragging{opacity:.4;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.cal-day-col.cal-drop-target{background:rgba(74,158,224,.12)!important;box-shadow:inset 0 0 0 2px var(--blue)}
.cal-allday-cell.cal-drop-target{background:rgba(74,158,224,.15)!important;box-shadow:inset 0 0 0 2px var(--blue)}
.cal-allday-ev[draggable="true"]{cursor:grab}
#dataloss-bar{position:fixed;top:0;left:0;right:0;z-index:2000;background:#b91c1c;color:#fff;display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:13px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.4)}
#dataloss-bar span{flex:1}
#cal-drag-label{position:fixed;z-index:1000;background:#2b7fd0;color:#fff;font-size:15px;font-weight:800;padding:7px 16px;border-radius:8px;pointer-events:none;box-shadow:0 4px 18px rgba(0,0,0,.7);white-space:nowrap;font-variant-numeric:tabular-nums;border:2px solid #fff;letter-spacing:.5px}
.cal-ev-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev-time{font-size:10px;opacity:.85}
.cal-ev-proj{font-size:9px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px}
.cal-ev-icons{display:flex;gap:3px;margin-top:2px;opacity:.75}
.cal-ev-icons i{font-size:9px}
/* カスタム予定カラー */
.cal-ev.c-blue  {background:#1a3a60;border-left:3px solid #4A9EE0;color:#a8d4f5}
.cal-ev.c-green {background:#0f2818;border-left:3px solid #3DB88A;color:#90dfc0}
.cal-ev.c-red   {background:#3a1212;border-left:3px solid #E05555;color:#f5a0a0}
.cal-ev.c-yellow{background:#2a1f08;border-left:3px solid #E0A040;color:#f0d090}
.cal-ev.c-purple{background:#1e1535;border-left:3px solid #9D8FE8;color:#ccc0f8}
/* タスクアクション */
.cal-ev.c-task-h{background:#3a1212;border-left:3px solid #E05555;color:#f5a0a0}
.cal-ev.c-task-m{background:#2a1f08;border-left:3px solid #E0A040;color:#f0d090}
.cal-ev.c-task-l{background:#0f2818;border-left:3px solid #3DB88A;color:#90dfc0}

/* 現在時刻ライン */
.cal-now-line{position:absolute;left:-1px;right:0;height:2px;background:#E05555;z-index:6;pointer-events:none}
.cal-now-dot{position:absolute;left:-5px;top:-4px;width:10px;height:10px;background:#E05555;border-radius:50%}

/* イベントポップオーバー */
.ev-popover{position:fixed;z-index:300;background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.55);width:300px;max-width:92vw;overflow:hidden}
.ev-popover-head{padding:12px 14px 10px;display:flex;align-items:flex-start;gap:8px}
.ev-popover-color{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:2px}
.ev-popover-title{font-size:15px;font-weight:700;color:var(--text);flex:1;line-height:1.3}
.ev-popover-btns{display:flex;gap:4px;flex-shrink:0}
.ev-popover-btn{width:28px;height:28px;background:none;border:none;cursor:pointer;color:var(--text2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .12s}
.ev-popover-btn:hover{background:var(--bg3);color:var(--text)}
.ev-popover-body{padding:0 14px 12px;display:flex;flex-direction:column;gap:7px}
.ev-popover-row{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--text2)}
.ev-popover-row i{font-size:14px;flex-shrink:0;margin-top:1px;color:var(--text3)}
.ev-popover-row strong{color:var(--text)}

/* 予定詳細・編集モーダル */
.ev-modal{width:520px;max-height:90vh}
.ev-color-row{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.ev-color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.ev-color-swatch:hover{transform:scale(1.15)}
.ev-color-swatch.sel{border-color:#fff;transform:scale(1.1)}
.ev-repeat-row{display:flex;gap:6px;flex-wrap:wrap}
.ev-rep-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;transition:background .12s,border-color .12s,color .12s}
.ev-rep-btn:hover{border-color:var(--text3);color:var(--text)}
.ev-rep-btn.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:600}

/* 月表示 */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow:auto}
.cal-month-head-cell{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:8px 4px;border-bottom:1px solid var(--border);letter-spacing:.4px;text-transform:uppercase;background:var(--bg2);position:sticky;top:0;z-index:5}
.cal-month-cell{border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:4px;min-height:110px;background:var(--bg);cursor:pointer;transition:background .12s;vertical-align:top}
.cal-month-cell:hover{background:var(--bg3)}
.cal-month-cell.other-month{background:#181818}
.cal-month-cell.is-today{background:rgba(74,158,224,.06)}
.cal-month-day-num{font-size:12px;font-weight:600;color:var(--text2);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.cal-month-cell.is-today .cal-month-day-num{background:var(--blue);color:#fff}
.cal-month-ev{border-radius:3px;padding:1px 5px;font-size:11px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .12s}
.cal-month-ev:hover{filter:brightness(1.2)}
.cal-month-ev-time{font-weight:700;opacity:.85;margin-right:3px;font-variant-numeric:tabular-nums}
.cal-month-more{font-size:10px;color:var(--text3);padding:1px 4px;cursor:pointer}
.cal-month-more:hover{color:var(--text)}

/* ═══════════════════════════════════════
   スマホ・タブレット対応（レスポンシブ）
═══════════════════════════════════════ */
/* タッチ中のドラッグゴースト */
.cal-ev.touch-dragging,.task-card.touch-dragging{opacity:.5;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.touch-drag-ghost{position:fixed;z-index:1500;pointer-events:none;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.6);opacity:.95;max-width:200px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* モバイル用ハンバーガー（既定は非表示） */
#mobile-menu-btn{display:none}
#sidebar-backdrop{display:none}
#mobile-fab{display:none}
#pwa-install-banner{display:none;position:fixed;left:12px;right:12px;bottom:70px;z-index:300;background:var(--bg2);border:1px solid var(--blue);border-radius:12px;padding:12px 14px;align-items:center;gap:12px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
#pwa-install-banner.show{display:flex}
#pwa-install-banner .pwa-icon{width:38px;height:38px;border-radius:8px;flex-shrink:0}
#pwa-install-banner .pwa-text{flex:1;min-width:0}
#pwa-install-banner .pwa-title{font-size:13px;font-weight:700;color:var(--text)}
#pwa-install-banner .pwa-sub{font-size:11px;color:var(--text3)}

@media (max-width: 820px){
  /* 左ペインをオーバーレイ式ドロワーに */
  .layout{grid-template-columns:1fr !important}
  .pane-left{
    position:fixed;top:0;left:0;bottom:0;width:86vw;max-width:340px;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.5);opacity:1 !important;pointer-events:auto !important;
  }
  .layout.sidebar-open .pane-left{transform:translateX(0)}
  .pane-left .pane-collapse-btn{display:flex;width:40px;height:40px;font-size:22px}
  #pane-expand-btn{display:none !important}
  /* ハンバーガー（大きめタップ領域） */
  #mobile-menu-btn{display:flex !important;align-items:center;justify-content:center;width:42px;height:42px;border:none;background:none;color:var(--text);font-size:26px;cursor:pointer;flex-shrink:0;border-radius:8px;-webkit-tap-highlight-color:transparent}
  #mobile-menu-btn:active{background:var(--bg3)}
  #sidebar-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;visibility:hidden;transition:opacity .25s}
  #sidebar-backdrop.show{opacity:1;visibility:visible}

  /* ヘッダー：1行に収め、ボタンはアイコンのみ＋大きく */
  .pane-right-head{padding:10px 12px;gap:6px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .proj-detail-name{font-size:16px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #right-meta{flex-shrink:0;display:flex;gap:6px}
  .pane-right-head .head-btn{padding:10px;font-size:0;gap:0;min-width:42px;min-height:42px;justify-content:center;flex-shrink:0}
  #right-title{flex-shrink:1}
  .pane-right-head .head-btn i{font-size:18px}
  .pane-right-head .head-btn.primary{font-size:13px;padding:10px 14px}
  .pane-right-head .head-btn.primary i{font-size:15px}

  /* 上部タブを下部固定ナビへ */
  .view-tabs{
    position:fixed;bottom:0;left:0;right:0;z-index:150;
    background:var(--bg2);border-top:1px solid var(--border);border-bottom:none;
    display:flex;justify-content:space-around;padding:0;
    padding-bottom:env(safe-area-inset-bottom,0);
    box-shadow:0 -2px 12px rgba(0,0,0,.3);
  }
  .view-tab{
    flex:1;flex-direction:column;gap:3px;padding:9px 2px 8px;font-size:10px;
    border-bottom:none;border-top:2px solid transparent;justify-content:center;
    white-space:nowrap;min-height:56px;
  }
  .view-tab.active{color:var(--blue);border-top-color:var(--blue);border-bottom-color:transparent;background:rgba(74,158,224,.08)}
  .view-tab i{font-size:22px !important;display:block}
  .view-tab .tab-label{display:block;font-size:10px;line-height:1.1}
  .view-tab .tab-label[data-short]{font-size:0}
  .view-tab .tab-label[data-short]::after{content:attr(data-short);font-size:10px}
  /* メインコンテンツに下部ナビ分の余白 */
  .pane-right{padding-bottom:60px}

  /* モーダルをタッチしやすく */
  .modal{width:94vw !important;max-width:94vw !important}
  .mb{padding:16px}
  .ib{width:40px;height:40px;font-size:18px}
  .task-card{padding:15px}
  input,textarea,select{font-size:16px !important} /* iOS/Androidのズーム防止 */
  .bsv,.bcnl{padding:11px 18px;font-size:14px}

  /* カレンダー */
  .cal-mini-pane{display:none}
  .cal-topbar{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .cal-period-label{font-size:16px;min-width:auto;order:5;width:100%;text-align:center}
  .cal-fab{padding:10px 16px;font-size:14px}
  .cal-fab i{font-size:20px}
  .cal-today-btn{padding:9px 14px;font-size:13px}
  .cal-nav-arrow{width:40px;height:40px;font-size:22px}
  .cal-view-switcher{margin-left:0}
  .cal-vsw-btn{padding:10px 14px;font-size:13px}
  .cal-settings-btn{width:40px;height:40px;font-size:18px}

  /* メモ縦積み */
  .memo-split{flex-direction:column}
  .memo-list-pane{width:100%;max-height:40vh;border-right:none;border-bottom:1px solid var(--border)}
  .memo-toolbar{flex-wrap:wrap;gap:6px}
  .memo-detail-pane{padding:18px 16px}
  .memo-detail-title{font-size:20px}

  /* ダッシュボード統計2列 */
  .stats-row{grid-template-columns:1fr 1fr}

  /* フローティング追加ボタン */
  #mobile-fab{
    display:flex;align-items:center;justify-content:center;
    position:fixed;right:18px;bottom:72px;z-index:160;
    width:56px;height:56px;border-radius:50%;border:none;
    background:var(--blue);color:#fff;font-size:28px;cursor:pointer;
    box-shadow:0 4px 16px rgba(74,158,224,.5);
    -webkit-tap-highlight-color:transparent;
  }
  #mobile-fab:active{transform:scale(.92);background:#3a8ed0}
}

@media (max-width: 480px){
  .stats-row{grid-template-columns:1fr 1fr;gap:6px}
  .cal-grid.week-view{min-width:600px} /* 横スクロール */
  .cal-grid.threeday-view{min-width:380px}
  .fr2,.fr3{grid-template-columns:1fr}
}

/* タッチデバイスでの最小タップ領域確保 */
@media (hover: none) and (pointer: coarse){
  .cal-ev{min-height:32px}
  .cal-vsw-btn,.cal-nav-arrow,.cal-today-btn{min-height:40px}
  button{touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,.1)}
  .proj-card{padding:14px}
}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><span>データを読み込み中...</span></div>
<div id="toast" class="toast"></div>

<!-- プロジェクト編集モーダル -->
<div class="modal-overlay" id="proj-ov">
  <div class="modal">
    <div class="mh"><span class="mh-t" id="proj-mttl">プロジェクトを追加</span><button class="mc" onclick="closeProjM()"><i class="ti ti-x"></i></button></div>
    <div class="mdiv"></div>
    <div class="mb">
      <div class="fl" id="fld-pname"><label>プロジェクト名 <span style="color:#E24B4A">*</span></label><input id="p-name" placeholder="例：新製品ローンチ"></div>
      <div class="fl"><label>詳細</label><textarea id="p-detail" placeholder="プロジェクトの目的・概要など"></textarea></div>
      <div class="fr2">
        <div class="fl"><label>期限</label><input type="date" id="p-date"></div>
        <div class="fl"><label>優先度</label><select id="p-pri"><option value="high">高</option><option value="mid" selected>中</option><option value="low">低</option></select></div>
      </div>
      <div class="fr2">
        <div class="fl"><label>カテゴリ</label><input id="p-cat" list="p-cat-dl" placeholder="例：営業、開発"><datalist id="p-cat-dl"></datalist></div>
        <div class="fl"><label>担当者</label><input id="p-members" placeholder="田中、佐藤"><p class="fhint">カンマ・読点区切り</p></div>
      </div>
      <div class="fl"><label>メモ</label><textarea id="p-memo" placeholder="補足など"></textarea></div>
    </div>
    <div class="mdiv"></div>
    <div class="mf"><button class="bcnl" onclick="closeProjM()">キャンセル</button><button class="bsv" onclick="saveProj()">保存</button></div>
  </div>
</div>

<!-- タスク編集モーダル -->
<div class="modal-overlay" id="task-ov">
  <div class="modal">
    <div class="mh"><span class="mh-t" id="task-mttl">タスクを追加</span><button class="mc" onclick="closeTaskM()"><i class="ti ti-x"></i></button></div>
    <div class="mdiv"></div>
    <div class="mb">
      <div class="fl" id="fld-tname"><label>タスク名 <span style="color:#E24B4A">*</span></label><input id="t-name" placeholder="例：デザイン案の作成"></div>
      <div class="fl"><label>詳細</label><textarea id="t-detail" placeholder="タスクの内容・目的など"></textarea></div>
      <div class="msec">次回アクション</div>
      <div class="fl"><label>アクション内容 <span style="font-size:10px;font-weight:400;color:var(--text3)">→ カレンダーのイベントタイトルになります</span></label><input id="t-action" placeholder="例：デザイン案をレビュー依頼"></div>
      <div class="fr3">
        <div class="fl"><label>実施日</label><input type="date" id="t-adate"></div>
        <div class="fl"><label>開始時刻</label><input type="time" id="t-atime"></div>
        <div class="fl"><label>終了時刻</label><input type="time" id="t-aetime"></div>
      </div>
      <div class="msec">タスク情報</div>
      <div class="fr2">
        <div class="fl"><label>期日</label><input type="date" id="t-date"></div>
        <div class="fl"><label>優先度</label><select id="t-pri"><option value="high">高</option><option value="mid" selected>中</option><option value="low">低</option></select></div>
      </div>
      <div class="fr2">
        <div class="fl"><label>担当者</label><input id="t-members" placeholder="田中、佐藤"><p class="fhint">カンマ・読点区切り</p></div>
        <div class="fl"><label>メモ</label><input id="t-memo" placeholder="補足など"></div>
      </div>
    </div>
    <div class="mdiv"></div>
    <div class="mf"><button class="bcnl" onclick="closeTaskM()">キャンセル</button><button class="bsv" onclick="saveTask()">保存</button></div>
  </div>
</div>

<!-- メモ編集モーダル -->
<div class="modal-overlay" id="memo-ov">
  <div class="modal memo-modal">
    <div class="mh"><span class="mh-t" id="memo-mttl">メモを追加</span><button class="mc" onclick="closeMemoM()"><i class="ti ti-x"></i></button></div>
    <div class="mdiv"></div>
    <div class="mb">
      <div class="fl" id="fld-memo-title"><label>タイトル <span style="color:#E24B4A">*</span></label><input id="m-title" placeholder="メモのタイトル"></div>
      <div class="fl"><label>内容</label><textarea id="m-body" placeholder="業務内容・気づき・決定事項など自由に記述..."></textarea></div>
      <div class="fr2">
        <div class="fl"><label>関連プロジェクト</label>
          <select id="m-proj" onchange="updateTaskSelect(this.value,'')">
            <option value="">（なし）</option>
          </select>
        </div>
        <div class="fl"><label>関連タスク</label>
          <select id="m-task">
            <option value="">（なし）</option>
          </select>
        </div>
      </div>
      <div class="fl">
        <label>タグ</label>
        <div class="tag-input-row">
          <input id="m-tag-input" placeholder="タグを入力してEnter or ＋ボタン" onkeydown="if(event.key==='Enter'){event.preventDefault();addMemoTag()}">
          <button class="tag-add-btn" onclick="addMemoTag()"><i class="ti ti-plus" style="font-size:12px"></i>追加</button>
        </div>
        <div class="tag-preview" id="m-tag-preview"></div>
      </div>
      <div class="fl">
        <label>ソートキー（カテゴリ）</label>
        <select id="m-sortkey">
          <option value="">（なし）</option>
          <option value="決定事項">決定事項</option>
          <option value="課題">課題</option>
          <option value="アイデア">アイデア</option>
          <option value="ミーティング">ミーティング</option>
          <option value="進捗">進捗</option>
          <option value="参考">参考</option>
        </select>
      </div>
    </div>
    <div class="mdiv"></div>
    <div class="mf"><button class="bcnl" onclick="closeMemoM()">キャンセル</button><button class="bsv" onclick="saveMemo()">保存</button></div>
  </div>
</div>

<!-- メインレイアウト -->
<div class="layout">
  <!-- 左：プロジェクト一覧 -->
  <div class="pane-left">
    <div class="pane-left-head">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">
        <div class="pane-title" style="margin:0"><i class="ti ti-folder"></i>プロジェクト<span id="proj-cnt" style="font-size:12px;font-weight:400;color:var(--text2)"></span></div>
        <button class="pane-collapse-btn" onclick="toggleSidebar()" title="サイドバーを折りたたむ"><i class="ti ti-layout-sidebar-left-collapse"></i></button>
      </div>
      <div class="pane-left-search"><i class="ti ti-search"></i><input id="proj-search" placeholder="プロジェクトを検索..." oninput="renderProjects()"></div>
      <div style="display:flex;align-items:center;gap:5px;margin-top:8px">
        <i class="ti ti-arrows-sort" style="font-size:13px;color:var(--text3)"></i>
        <select id="proj-sort" onchange="renderProjects()" style="flex:1;padding:5px 7px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:11px;font-family:inherit;cursor:pointer">
          <option value="none">並び順：登録順</option>
          <option value="category">カテゴリ別</option>
          <option value="priority">優先度別（高→低）</option>
          <option value="date">期限が近い順</option>
          <option value="name">名前順</option>
        </select>
      </div>
    </div>
    <div class="proj-list" id="proj-list"></div>
    <button class="proj-add-btn" onclick="openProjM(null)"><i class="ti ti-plus"></i>プロジェクトを追加</button>
    <div class="archive-section" id="archive-section" style="display:none">
      <button class="archive-toggle" onclick="toggleArchive()">
        <i class="ti ti-archive" style="font-size:13px"></i>
        アーカイブ（完了済み）
        <span id="archive-cnt" style="margin-left:auto;font-size:11px"></span>
        <i class="ti ti-chevron-down" id="archive-chevron" style="font-size:12px"></i>
      </button>
      <div class="archive-list" id="archive-list"></div>
    </div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzEMfoi5IRf06m_JyacFjE-1T_aALWbHAF2L97e2a7ViMVigZKBbBwQt0OTqg94tQbdww/exec';

/* ── データ ── */
let projects = [], tasks = [], memos = [];
let selectedProjId = null;
let pnid = 1, tnid = 1, mnid = 1;
let editProjId = null, editTaskId = null, editMemoId = null;
let cs = 'none';
let currentMemoTags = [];
let activeTagFilter = null;
let selectedMemoId = null;

const po = {high:0,mid:1,low:2};
const pl = {high:'高',mid:'中',low:'低'};
const catMap = {}; let catIdx = 0;
const catCls = ['ca','cb2','cc','cd','ce'];
function getCls(c){if(!c)return'';if(!(c in catMap))catMap[c]=catIdx++%5;return catCls[catMap[c]];}

function localDateStr(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dy=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dy}`;}
function today(){return localDateStr(new Date());}
function nowISO(){return new Date().toISOString();}
function fmt(d){if(!d)return'—';const[,m,dy]=d.split('-');return`${m}/${dy}`;}
function fmtAdt(d,ts,te){if(!d)return null;const[,m,dy]=d.split('-');let s=`${m}/${dy}`;if(ts)s+=` ${ts}`;if(te)s+=`〜${te}`;return s;}
function fmtDatetime(iso){if(!iso)return'';const d=new Date(iso);const m=d.getMonth()+1,dy=d.getDate();const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');return`${m}/${dy} ${hh}:${mm}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── GAS通信 ── */
let _cbSeq=0;
/* ═══════════════════════════════════════
   自動バックアップシステム（localStorage）
   - 保存成功時・5分ごとに自動スナップショット
   - 最大30世代を保持（古いものから削除）
   - データ激減時は警告
═══════════════════════════════════════ */
const BACKUP_KEY='pm_backups_v1';
const BACKUP_MAX=30;            // 保持する世代数
const BACKUP_MIN_INTERVAL=60000; // 同種バックアップの最小間隔(ms)
let _lastBackupAt=0;

function getBackups(){
  try{ return JSON.parse(localStorage.getItem(BACKUP_KEY)||'[]'); }
  catch(e){ return []; }
}
function setBackups(arr){
  try{ localStorage.setItem(BACKUP_KEY,JSON.stringify(arr)); return true; }
  catch(e){
    // 容量超過時は古い世代を削って再試行
    try{
      while(arr.length>5){ arr.shift(); }
      localStorage.setItem(BACKUP_KEY,JSON.stringify(arr));
      return true;
    }catch(e2){ console.error('backup save failed',e2); return false; }
  }
}

function dataSnapshot(){
  return {
    projects:JSON.parse(JSON.stringify(projects||[])),
    tasks:JSON.parse(JSON.stringify(tasks||[])),
    memos:JSON.parse(JSON.stringify(memos||[])),
    calEvents:JSON.parse(JSON.stringify(calEvents||[])),
  };
}

function saveLocalBackup(reason, force){
  const now=Date.now();
  if(!force && now-_lastBackupAt<BACKUP_MIN_INTERVAL) return; // 短時間の連続バックアップを抑制
  const snap=dataSnapshot();
  // 空データは自動バックアップしない（誤上書き防止）。手動・force時のみ許可
  const total=snap.projects.length+snap.tasks.length+snap.memos.length+snap.calEvents.length;
  if(total===0 && !force) return;
  const backups=getBackups();
  // 直前のバックアップと内容が同一ならスキップ
  const last=backups[backups.length-1];
  const sig=`${snap.projects.length}/${snap.tasks.length}/${snap.memos.length}/${snap.calEvents.length}`;
  const lastSig=last?`${last.counts.projects}/${last.counts.tasks}/${last.counts.memos}/${last.counts.calEvents}`:'';
  const lastJson=last?JSON.stringify(last.data):'';
  if(last && lastJson===JSON.stringify(snap)) return; // 完全一致ならスキップ
  backups.push({
    at:new Date().toISOString(),
    reason:reason||'auto',
    counts:{projects:snap.projects.length,tasks:snap.tasks.length,memos:snap.memos.length,calEvents:snap.calEvents.length},
    data:snap
  });
  while(backups.length>BACKUP_MAX) backups.shift();
  setBackups(backups);
  _lastBackupAt=now;
}

// データ激減の検知（読み込み後に呼ぶ）
function checkDataLoss(){
  const backups=getBackups();
  if(!backups.length) return;
  // 直近バックアップの最大カウントと現在を比較
  const recent=backups.slice(-5);
  const maxPast={projects:0,tasks:0,memos:0,calEvents:0};
  recent.forEach(b=>{
    ['projects','tasks','memos','calEvents'].forEach(k=>{ maxPast[k]=Math.max(maxPast[k],b.counts[k]); });
  });
  const cur={projects:projects.length,tasks:tasks.length,memos:memos.length,calEvents:calEvents.length};
  // いずれかが過去最大の半分未満かつ過去に3件以上あった → 警告
  const lost=[];
  if(maxPast.projects>=3 && cur.projects<maxPast.projects*0.5) lost.push(`プロジェクト ${maxPast.projects}→${cur.projects}`);
  if(maxPast.tasks>=3 && cur.tasks<maxPast.tasks*0.5) lost.push(`タスク ${maxPast.tasks}→${cur.tasks}`);
  if(maxPast.memos>=3 && cur.memos<maxPast.memos*0.5) lost.push(`メモ ${maxPast.memos}→${cur.memos}`);
  if(maxPast.calEvents>=3 && cur.calEvents<maxPast.calEvents*0.5) lost.push(`予定 ${maxPast.calEvents}→${cur.calEvents}`);
  if(lost.length){
    showDataLossWarning(lost);
  }
}

function showDataLossWarning(lost){
  const bar=document.createElement('div');
  bar.id='dataloss-bar';
  bar.innerHTML=`<i class="ti ti-alert-triangle" style="font-size:18px"></i>
    <span>データが大幅に減少しています（${lost.join('、')}）。バックアップから復元できます。</span>
    <button onclick="openBackupModal()" style="background:#fff;color:#b91c1c;border:none;padding:5px 12px;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px">復元する</button>
    <button onclick="document.getElementById('dataloss-bar').remove()" style="background:none;border:1px solid rgba(255,255,255,.5);color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px">閉じる</button>`;
  document.body.appendChild(bar);
}

/* ── バックアップ管理モーダル ── */
function openBackupModal(){
  const backups=getBackups().slice().reverse(); // 新しい順
  const el=document.getElementById('backup-list');
  if(!backups.length){

      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg2)">
        <i class="ti ti-clock" style="font-size:16px;color:var(--text3)"></i>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${dateStr} <span style="font-size:10px;color:var(--text3);font-weight:400">(${reasonLabel})</span></div>
          <div style="font-size:11px;color:var(--text3)">PJ ${b.counts.projects} ・ タスク ${b.counts.tasks} ・ メモ ${b.counts.memos} ・ 予定 ${b.counts.calEvents}</div>
        </div>
        <button onclick="restoreBackup(${idx})" class="head-btn" style="font-size:11px;padding:5px 10px"><i class="ti ti-restore"></i>復元</button>
      </div>`;
    }).join('');
  }
  document.getElementById('backup-ov').classList.add('open');
}
function closeBackupModal(){ document.getElementById('backup-ov').classList.remove('open'); }

function restoreBackup(idx){
  const backups=getBackups();
  const b=backups[idx];
  if(!b){ showToast('⚠️ バックアップが見つかりません','error'); return; }
  const d=new Date(b.at);
  const dateStr=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if(!confirm(`${dateStr} 時点のバックアップを復元します。\n\nPJ ${b.counts.projects} / タスク ${b.counts.tasks} / メモ ${b.counts.memos} / 予定 ${b.counts.calEvents}\n\n現在のデータは上書きされます（復元前に現在の状態も自動バックアップされます）。よろしいですか？`)) return;
  // 復元前に現在の状態をバックアップ
  saveLocalBackup('beforeRestore',true);
  // 復元
  projects=JSON.parse(JSON.stringify(b.data.projects||[]));
  tasks=JSON.parse(JSON.stringify(b.data.tasks||[])).map((t,i)=>({...t,order:t.order!=null?Number(t.order):i}));
  memos=JSON.parse(JSON.stringify(b.data.memos||[]));
  calEvents=JSON.parse(JSON.stringify(b.data.calEvents||[]));
  pnid=projects.length?Math.max(...projects.map(p=>Number(p.id)||0))+1:1;
  tnid=tasks.length?Math.max(...tasks.map(t=>Number(t.id)||0))+1:1;
  mnid=memos.length?Math.max(...memos.map(m=>Number(m.id)||0))+1:1;
  ceNid=calEvents.length?Math.max(...calEvents.map(e=>Number(e.id)||0))+1:1;
  selectedProjId=null;
  closeBackupModal();
  const bar=document.getElementById('dataloss-bar'); if(bar)bar.remove();
  // 復元内容をGASにも保存
  gasSave({wait:1200});
  renderProjects(); renderTasks();
  if(currentTab==='memo')renderMemos();
  if(currentTab==='cal')renderCalView();
  if(currentTab==='actions')renderActions();
  showToast(`✓ ${dateStr} のバックアップを復元しました`);
}

function jsonpFetch(params){
  return new Promise((resolve,reject)=>{
    const cb='__cb_'+Date.now()+'_'+(++_cbSeq);
    const s=document.createElement('script');
    const t=setTimeout(()=>{delete window[cb];if(s.parentNode)document.body.removeChild(s);reject(new Error('timeout (30s)'));},30000);
    window[cb]=(d)=>{clearTimeout(t);delete window[cb];if(s.parentNode)document.body.removeChild(s);resolve(d);};
    s.src=GAS_URL+'?'+new URLSearchParams({...params,callback:cb}).toString();
    s.onerror=()=>{clearTimeout(t);if(s.parentNode)document.body.removeChild(s);reject(new Error('script error'));};
    document.body.appendChild(s);
  });
}
let _isSaving=false;
let _lastSavedAt=0;
let _saveTimer=null;
let _pendingSave=false;
let _savePromise=null;

async function gasSave(opts){
  opts=opts||{};
  // 既に保存中なら、二重書き込みを防ぎ「保存待ち」として登録
  if(_isSaving){_pendingSave=true;return _savePromise;}
  _isSaving=true;
  _pendingSave=false;
  _savePromise=(async()=>{
    try{
      // no-corsはレスポンスを読めないため、送信後に反映待ちを入れる
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({projects,tasks,memos,calEvents})});
      // GAS側のスプレッドシート書き込み完了を待つ（手動保存時は明示待機）
      if(opts.wait){ await new Promise(r=>setTimeout(r,opts.wait)); }
      _lastSavedAt=Date.now();
      saveLocalBackup('save'); // 保存成功時に自動バックアップ
      if(!opts.silent) showToast('✓ 保存しました');
    }catch(e){
      showToast('⚠️ 保存に失敗しました','error');
    }finally{
      _isSaving=false;
      // 保存中に変更があった場合は再保存（二重書き込みにならないようシリアル実行）
      if(_pendingSave){ _pendingSave=false; scheduleSave(); }
    }
  })();
  return _savePromise;
}
function scheduleSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>gasSave(),600); // 自動保存（待機なし・軽量）
}

let _isLoading=false;

async function loadData(){
  // 多重実行防止
  if(_isLoading)return;
  _isLoading=true;

  // 保存中なら完了を待つ（最大3秒）
  if(_isSaving||_saveTimer){
    clearTimeout(_saveTimer);
    await gasSave({silent:true,wait:800});
  }

  showLoading(true);
  try{
    const d=await jsonpFetch({action:'load'});
    if(d.ok){
      // IDの重複チェックしてから代入
      const projIds=new Set(),taskIds=new Set(),memoIds=new Set();
      const safeProjects=(d.projects||[]).filter(p=>{
        const id=Number(p.id);if(!id||projIds.has(id))return false;projIds.add(id);return true;
      });
      const safeTasks=(d.tasks||[]).filter(t=>{
        const id=Number(t.id);if(!id||taskIds.has(id))return false;taskIds.add(id);return true;
      });
      const safeMemos=(d.memos||[]).filter(m=>{
        const id=Number(m.id);if(!id||memoIds.has(id))return false;memoIds.add(id);return true;
      });
      const calEvIds=new Set();
      const safeCalEvents=(d.calEvents||[]).filter(e=>{
        const id=Number(e.id);if(!id||calEvIds.has(id))return false;calEvIds.add(id);return true;
      });
      projects=safeProjects;
      tasks=safeTasks.map((t,i)=>({...t,order:t.order!=null?Number(t.order):i}));
      memos=safeMemos;
      calEvents=safeCalEvents;
      pnid=projects.length?Math.max(...projects.map(p=>Number(p.id)||0))+1:1;
      tnid=tasks.length?Math.max(...tasks.map(t=>Number(t.id)||0))+1:1;
      mnid=memos.length?Math.max(...memos.map(m=>Number(m.id)||0))+1:1;
      ceNid=calEvents.length?Math.max(...calEvents.map(e=>Number(e.id)||0))+1:1;
      // 読み込んだ正常データをバックアップ
      saveLocalBackup('save',true);
      showToast('✓ データを読み込みました');
    }
  }catch(e){showToast('⚠️ スプレッドシートへの接続に失敗しました: '+e.message,'error');console.error(e);}
  finally{
    _isLoading=false;
    showLoading(false);
  }
  renderProjects();
  renderTasks();
  if(currentTab==='actions') renderActions();
  if(currentTab==='memo') renderMemos();
  // データ消失の検知
  setTimeout(checkDataLoss,100);
  if(currentTab==='cal') renderCalView();
  scheduleAlerts();
}

async function reloadData(){
  const btn=document.getElementById('reload-btn');
  if(btn){btn.classList.add('spinning');btn.disabled=true;}
  await loadData();
  if(btn){btn.classList.remove('spinning');btn.disabled=false;}
}

async function manualSave(){
  // 予約中の自動保存をキャンセル（二重書き込み防止）
  clearTimeout(_saveTimer);
  const btns=document.querySelectorAll('.save-btn');
  btns.forEach(b=>{b.classList.add('spinning');b.disabled=true;});
  // 既に保存中ならその完了を待ち、そうでなければ3秒の反映待ち付きで保存
  if(_isSaving){
    await _savePromise;
  }else{
    await gasSave({wait:1200});
  }
  btns.forEach(b=>{b.classList.remove('spinning');b.disabled=false;});
}

function exportData(){
  const payload={
    _meta:{app:'project-manager',version:'2.0',exportedAt:new Date().toISOString()},

  };

function importData(e){
  const file=e.target.files&&e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      if(!d||(!Array.isArray(d.projects)&&!Array.isArray(d.tasks))){
        showToast('⚠️ 無効なファイル形式です','error'); return;
      }
      const cnt=`プロジェクト${(d.projects||[]).length}件 / タスク${(d.tasks||[]).length}件 / メモ${(d.memos||[]).length}件 / 予定${(d.calEvents||[]).length}件`;
      if(!confirm(`現在のデータを以下の内容で上書きします。よろしいですか？\n\n${cnt}\n\n※現在のデータは失われます。事前にエクスポートを推奨します。`)){
        e.target.value=''; return;
      }
      projects=d.projects||[];
      tasks=(d.tasks||[]).map((t,i)=>({...t,order:t.order!=null?Number(t.order):i}));
      memos=d.memos||[];
      calEvents=d.calEvents||[];
      pnid=projects.length?Math.max(...projects.map(p=>Number(p.id)||0))+1:1;
      tnid=tasks.length?Math.max(...tasks.map(t=>Number(t.id)||0))+1:1;
      mnid=memos.length?Math.max(...memos.map(m=>Number(m.id)||0))+1:1;
      ceNid=calEvents.length?Math.max(...calEvents.map(x=>Number(x.id)||0))+1:1;
      selectedProjId=null;
      scheduleSave();
      renderProjects(); renderTasks();
      if(currentTab==='memo')renderMemos();
      if(currentTab==='cal')renderCalView();
      if(currentTab==='actions')renderActions();
      showToast('✓ データを復元しました');
    }catch(err){
      showToast('⚠️ 読み込みに失敗しました: '+err.message,'error');
    }
    e.target.value='';
  };
  reader.readAsText(file);
}

function runGlobalSearch(){
  const q=document.getElementById('gsearch-input').value.trim().toLowerCase();
  const el=document.getElementById('gsearch-results');
  if(!q){ el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:1rem;text-align:center">キーワードを入力してください</div>'; return; }
  const results=[];
  // プロジェクト
  projects.forEach(p=>{
    if([p.name,p.detail,p.category,p.memo,...(p.members||[])].join(' ').toLowerCase().includes(q))
      results.push({type:'project',icon:'ti-folder',color:'var(--blue)',title:p.name,sub:(p.category||'')+(p.done?' ・完了':''),act:`gsOpenProject(${p.id})`});
  });
  // タスク
  tasks.forEach(t=>{
    if([t.name,t.detail,t.action,t.memo,...(t.members||[])].join(' ').toLowerCase().includes(q)){
      const proj=projects.find(p=>p.id===t.projectId);
      results.push({type:'task',icon:'ti-checkbox',color:'var(--green)',title:t.name,sub:(proj?proj.name:'')+(t.done?' ・完了':''),act:`gsOpenTask(${t.id})`});
    }
  });
  // メモ
  memos.forEach(m=>{
    if([m.title,m.body,m.sortkey,...(m.tags||[])].join(' ').toLowerCase().includes(q))
      results.push({type:'memo',icon:'ti-notes',color:'var(--yellow)',title:m.title,sub:(m.sortkey||'メモ'),act:`gsOpenMemo(${m.id})`});
  });
  // 予定
  calEvents.forEach(ev=>{
    if([ev.title,ev.memo].join(' ').toLowerCase().includes(q))
      results.push({type:'event',icon:'ti-calendar-event',color:'#9D8FE8',title:ev.title,sub:`${ev.date}${ev.startTime?' '+ev.startTime:''}`,act:`gsOpenEvent('${ev.id}','${ev.date}')`});
  });

  if(!results.length){ el.innerHTML='<div style="color:var(--text3);font-size:13px;padding:1rem;text-align:center">該当する結果がありません</div>'; return; }
  const typeLabel={project:'プロジェクト',task:'タスク',memo:'メモ',event:'予定'};
  el.innerHTML=results.slice(0,50).map(r=>`
    <div onclick="${r.act}" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .12s" onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background='transparent'">
      <i class="ti ${r.icon}" style="font-size:18px;color:${r.color};flex-shrink:0"></i>
      <div style="min-width:0;flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.title)}</div>
        <div style="font-size:11px;color:var(--text3)">${typeLabel[r.type]}${r.sub?' ・ '+esc(r.sub):''}</div>
      </div>
      <i class="ti ti-arrow-right" style="font-size:13px;color:var(--text3)"></i>
    </div>`).join('')+(results.length>50?`<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px">他${results.length-50}件</div>`:'');
}

function projCardHTML(p, archived=false){
  const td=today();
  const ov=p.date&&p.date<td&&!p.done;
  // このプロジェクトの未完了タスクから期限アラートを集計
  let alertBadge='';
  if(!archived&&!p.done){
    const pts=tasks.filter(t=>t.projectId===p.id&&!t.done);
    const od=pts.filter(t=>t.date&&t.date<td).length;
    const todayCnt=pts.filter(t=>t.date===td||t.actionDate===td).length;
    if(od>0) alertBadge=`<span class="proj-alert-badge ov" title="期限超過タスク ${od}件"><i class="ti ti-alert-triangle" style="font-size:9px"></i>${od}</span>`;
    else if(todayCnt>0) alertBadge=`<span class="proj-alert-badge today" title="今日のタスク/アクション ${todayCnt}件"><i class="ti ti-sun" style="font-size:9px"></i>${todayCnt}</span>`;
  }
  return`<div class="proj-card${selectedProjId===p.id?' active':''}${archived?' archived':''}" onclick="selectProj(${p.id})">
    <div class="proj-card-name">
      ${p.done?'<i class="ti ti-circle-check" style="color:var(--green);font-size:14px"></i>':'<i class="ti ti-folder" style="font-size:14px;color:var(--text2)"></i>'}
      <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      ${alertBadge}
    </div>
    <div class="proj-card-meta">
      ${p.date?`<span class="proj-card-date${ov?' date-ov':''}"><i class="ti ti-calendar" style="font-size:10px"></i> ${fmt(p.date)}</span>`:''}
      ${p.priority&&!p.done?`<span class="pb p${p.priority.charAt(0)}">${pl[p.priority]}</span>`:''}
      ${p.category?`<span class="cbadge ${getCls(p.category)}">${esc(p.category)}</span>`:''}
    </div>
  </div>`;
}

function sortProjects(arr){
  const mode=document.getElementById('proj-sort')?.value||'none';
  const a=[...arr];
  const pord={high:0,mid:1,low:2};
  if(mode==='priority'){
    a.sort((x,y)=>(pord[x.priority]??1)-(pord[y.priority]??1));
  }else if(mode==='date'){
    a.sort((x,y)=>(x.date||'9999-99-99')>(y.date||'9999-99-99')?1:(x.date||'9999-99-99')<(y.date||'9999-99-99')?-1:0);
  }else if(mode==='name'){
    a.sort((x,y)=>x.name.localeCompare(y.name,'ja'));
  }
  // category は描画側でグループ化するため、ここでは元順を維持
  return a;
}

function renderProjects(){
  const q=document.getElementById('proj-search').value.trim().toLowerCase();
  const sortMode=document.getElementById('proj-sort')?.value||'none';
  let active=projects.filter(p=>!p.done&&(!q||p.name.toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)));
  const archived=projects.filter(p=>p.done&&(!q||p.name.toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)));
  document.getElementById('proj-cnt').textContent=' '+active.length+'件';
  const el=document.getElementById('proj-list');
  if(!active.length){
    el.innerHTML=`<div class="proj-empty"><i class="ti ti-folder-off" style="font-size:28px;display:block;margin:0 auto 8px"></i>${projects.filter(p=>!p.done).length?'該当なし':'プロジェクトがありません'}</div>`;
  }else if(sortMode==='category'){
    // カテゴリ別グループ表示
    const groups={};
    const noCatKey='__nocat__';
    active.forEach(p=>{
      const k=p.category||noCatKey;
      if(!groups[k])groups[k]=[];
      groups[k].push(p);
    });
    const catNames=Object.keys(groups).filter(k=>k!==noCatKey).sort((a,b)=>a.localeCompare(b,'ja'));
    if(groups[noCatKey])catNames.push(noCatKey);
    el.innerHTML=catNames.map(cat=>{
      const label=cat===noCatKey?'カテゴリなし':cat;
      const items=groups[cat].map(p=>projCardHTML(p,false)).join('');
      return `<div class="proj-group-label"><span class="cbadge ${cat===noCatKey?'ce':getCls(cat)}">${esc(label)}</span><span style="color:var(--text3);font-size:10px">${groups[cat].length}</span></div>${items}`;
    }).join('');
  }else if(sortMode==='priority'){
    // 優先度別グループ表示
    const groups={high:[],mid:[],low:[]};
    active.forEach(p=>{ const k=p.priority||'mid'; (groups[k]||groups.mid).push(p); });
    const plabels={high:'高優先度',mid:'中優先度',low:'低優先度'};
    el.innerHTML=['high','mid','low'].filter(k=>groups[k].length).map(k=>{
      const items=groups[k].map(p=>projCardHTML(p,false)).join('');
      return `<div class="proj-group-label"><span class="pb p${k.charAt(0)}">${plabels[k]}</span><span style="color:var(--text3);font-size:10px">${groups[k].length}</span></div>${items}`;
    }).join('');
  }else{
    el.innerHTML=sortProjects(active).map(p=>projCardHTML(p,false)).join('');
  }
  const archSec=document.getElementById('archive-section');
  const archList=document.getElementById('archive-list');
  const archCnt=document.getElementById('archive-cnt');
  if(archived.length>0){
    archSec.style.display='';
    archCnt.textContent=archived.length+'件';
    archList.innerHTML=archived.map(p=>projCardHTML(p,true)).join('');
  }else{
    archSec.style.display='none';
  }
  const cats=[...new Set(projects.map(p=>p.category).filter(Boolean))];
  document.getElementById('p-cat-dl').innerHTML=cats.map(c=>`<option value="${esc(c)}">`).join('');
  // メモフィルター更新
  updateMemoProjFilter();
}

function selectProj(id){
  selectedProjId=id;
  renderProjects();

  // タスク以外のタブを開いている場合は自動でタスクタブへ切り替え

  closeSidebarDrawer();
}

function openProjM(id){
  editProjId=id;
  document.getElementById('proj-mttl').textContent=id?'プロジェクトを編集':'プロジェクトを追加';
  document.getElementById('fld-pname').classList.remove('err');
  if(id){
    const p=projects.find(x=>x.id===id);
    document.getElementById('p-name').value=p.name;
    document.getElementById('p-detail').value=p.detail||'';
    document.getElementById('p-date').value=p.date||'';
    document.getElementById('p-pri').value=p.priority||'mid';
    document.getElementById('p-cat').value=p.category||'';
    document.getElementById('p-members').value=(p.members||[]).join('、');
    document.getElementById('p-memo').value=p.memo||'';
  }else{
    ['p-name','p-detail','p-cat','p-members','p-memo'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('p-date').value='';document.getElementById('p-pri').value='mid';
  }
  document.getElementById('proj-ov').classList.add('open');
  setTimeout(()=>document.getElementById('p-name').focus(),50);
}
function closeProjM(){document.getElementById('proj-ov').classList.remove('open');editProjId=null;}
function saveProj(){
  const name=document.getElementById('p-name').value.trim();
  if(!name){document.getElementById('fld-pname').classList.add('err');document.getElementById('p-name').focus();return;}
  const members=document.getElementById('p-members').value.split(/[,、，\s]+/).map(s=>s.trim()).filter(Boolean);
  const cat=document.getElementById('p-cat').value.trim();
  if(cat&&!(cat in catMap))catMap[cat]=catIdx++%5;
  const data={name,detail:document.getElementById('p-detail').value.trim(),date:document.getElementById('p-date').value,priority:document.getElementById('p-pri').value,category:cat,members,memo:document.getElementById('p-memo').value.trim()};
  if(editProjId){const i=projects.findIndex(p=>p.id===editProjId);projects[i]={...projects[i],...data};}
  else{const p={id:pnid++,done:false,...data};projects.push(p);selectedProjId=p.id;}
  closeProjM();scheduleSave();renderProjects();renderTasks();
}
function deleteProj(id){
  if(!confirm('プロジェクトとその全タスクを削除しますか？'))return;
  projects=projects.filter(p=>p.id!==id);
  tasks=tasks.filter(t=>t.projectId!==id);
  if(selectedProjId===id)selectedProjId=null;
  scheduleSave();renderProjects();renderTasks();
}
function toggleProjDone(id){
  const p=projects.find(x=>x.id===id);if(!p)return;
  p.done=!p.done;
  scheduleSave();renderProjects();renderTasks();
  showToast(p.done?`「${p.name}」を完了・アーカイブしました`:`「${p.name}」を再開しました`);
}

/* ── タスク ── */
function projTasks(){
  if(!selectedProjId)return[];
  return tasks.filter(t=>t.projectId===selectedProjId);
}
function filteredTasks(){
  const q=document.getElementById('t-search')?.value.trim().toLowerCase()||'';
  const fp=document.getElementById('t-fp')?.value||'';
  return projTasks().filter(t=>{
    if(t.done)return false;
    if(fp&&t.priority!==fp)return false;
    if(q){const h=[t.name,t.detail,t.action,...(t.members||[]),t.memo].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
}
function archivedTasks(){
  const q=document.getElementById('t-search')?.value.trim().toLowerCase()||'';
  return projTasks().filter(t=>{
    if(!t.done)return false;
    if(q){const h=[t.name,t.detail,t.action,...(t.members||[]),t.memo].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
}
function sortedTasks(arr){
  let a=[...arr];
  if(cs==='date')a.sort((x,y)=>(x.date||'9999')>(y.date||'9999')?1:-1);
  else if(cs==='adate')a.sort((x,y)=>(x.actionDate||'9999')>(y.actionDate||'9999')?1:-1);
  else if(cs==='priority')a.sort((x,y)=>po[x.priority]-po[y.priority]);
  else a.sort((x,y)=>(x.order??999)-(y.order??999)); // デフォルトはorder順
  return a;
}
function setSort(k){cs=k;renderTasks();}

function addDays(dateStr,n){
  const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n);
  return localDateStr(d);
}

/* ── D&D 並び替え ── */
let dragSrcId=null;
function initDragDrop(){
  if(cs!=='none')return;
  const container=document.getElementById('task-cards-container');
  if(!container)return;
  container.querySelectorAll('.task-card[draggable="true"]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragSrcId=parseInt(card.dataset.tid);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',dragSrcId);
    });
    card.addEventListener('dragend',()=>{
      card.classList.remove('dragging');
      container.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
    });
    card.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      container.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    });
    card.addEventListener('drop',e=>{
      e.preventDefault();
      const destId=parseInt(card.dataset.tid);
      if(dragSrcId===null||dragSrcId===destId)return;
      reorderTasks(dragSrcId,destId);
      dragSrcId=null;
    });
  });
}
function reorderTasks(srcId,destId){
  // プロジェクト内の未完了タスクだけ並び替え
  const pt=projTasks().filter(t=>!t.done);
  const sorted=sortedTasks(pt);
  const srcIdx=sorted.findIndex(t=>t.id===srcId);
  const destIdx=sorted.findIndex(t=>t.id===destId);
  if(srcIdx<0||destIdx<0)return;
  const [moved]=sorted.splice(srcIdx,1);
  sorted.splice(destIdx,0,moved);
  // orderを再付与
  sorted.forEach((t,i)=>{
    const ti=tasks.findIndex(x=>x.id===t.id);
    if(ti>=0)tasks[ti].order=i;
  });
  scheduleSave();
  renderTasks();
}
